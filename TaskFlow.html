  currentListId: 'inbox',
  selectedTaskId: null,
  detailOpen: false,
  sidebarOpen: true,

  // Data (cached in memory)
  tasks: [],
  lists: [],
  folders: [],
  tags: [],
  habits: [],

  // UI state
  searchQuery: '',
  searchOpen: false,
  sortBy: 'sortOrder',        // sortOrder | dueDate | priority | title | createdAt
  sortDir: 'asc',
  filterTags: [],
  filterPriority: null,

  // Calendar
  calendarDate: new Date(),
  calendarMode: 'month',      // month | week
  calendarListFilter: 'all',  // 'all' | 'inbox' | list id
  calendarTagFilter: '',      // '' = all tags, or a tagId

  // Kanban
  kanbanListFilter: 'all',     // 'all' | 'inbox' | list id

  // Eisenhower
  eisenhowerListFilter: 'all', // 'all' | 'inbox' | list id

  // Pomodoro
  pomodoroState: 'idle',      // idle | running | paused
  pomodoroType: 'work',       // work | shortBreak | longBreak
  pomodoroTimeLeft: 25 * 60,
  pomodoroSession: 0,
  pomodoroTaskId: null,

  // Modals
  modalOpen: null,             // null | 'addList' | 'addFolder' | 'addTask' | 'addHabit' | 'editList' | 'confirm' | 'addTag'
  modalData: null,

  // Editing
  editingListId: null,
  editingFolderId: null,
};

const listeners = {};

function subscribe(key, callback) {
  if (!listeners[key]) listeners[key] = [];
  listeners[key].push(callback);
  return () => {
    listeners[key] = listeners[key].filter(cb => cb !== callback);
  };
}

function subscribeMultiple(keys, callback) {
  const unsubs = keys.map(key => subscribe(key, callback));
  return () => unsubs.forEach(u => u());
}

function emit(key) {
  if (listeners[key]) {
    listeners[key].forEach(cb => cb(state[key], state));
  }
  // Also emit a wildcard for global listeners
  if (listeners['*']) {
    listeners['*'].forEach(cb => cb(key, state[key], state));
  }
}

function setState(updates) {
  const changedKeys = [];
  for (const [key, value] of Object.entries(updates)) {
    if (state[key] !== value) {
      state[key] = value;
      changedKeys.push(key);
    }
  }
  changedKeys.forEach(key => emit(key));
}

function getState(key) {
  return key ? state[key] : { ...state };
}


// ── js/utils/theme.js ──
// ============================================
// Theme Manager
// ============================================



async function initTheme() {
  let theme = await getSetting('theme', 'light');

  // Check system preference if no saved preference
  if (!theme) {
    theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }

  applyTheme(theme);

  // Listen for system theme changes
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
    const savedTheme = getState('theme');
    if (!savedTheme || savedTheme === 'system') {
      applyTheme(e.matches ? 'dark' : 'light');
    }
  });
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  setState({ theme });
}

async function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  await setSetting('theme', next);
}

function getCurrentTheme() {
  return document.documentElement.getAttribute('data-theme') || 'light';
}


// ── js/utils/shortcuts.js ──
// ============================================
// Keyboard Shortcuts Manager
// ============================================


function initShortcuts() {
  document.addEventListener('keydown', (e) => {
    // Global shortcut: Ctrl+Shift+A — works even in inputs and modals
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'a' || e.key === 'A')) {
      e.preventDefault();
      setState({ modalOpen: 'globalQuickAdd', modalData: null });
      return;
    }

    // Ignore if typing in input/textarea
    const tag = e.target.tagName.toLowerCase();
    if (tag === 'input' || tag === 'textarea' || tag === 'select') return;

    // Ignore if modal is open
    if (state.modalOpen) {
      if (e.key === 'Escape') {
        setState({ modalOpen: null, modalData: null });
      }
      return;
    }

    switch (e.key) {
      case 'n':
      case 'N':
        e.preventDefault();
        // Focus quick add or open modal
        const quickAdd = document.getElementById('quick-add-input');
        if (quickAdd) {
          quickAdd.focus();
        } else {
          setState({ modalOpen: 'addTask', modalData: null });
        }
        break;

      case '/':
        e.preventDefault();
        const searchInput = document.getElementById('sidebar-search');
        if (searchInput) searchInput.focus();
        break;

      case 'Escape':
        if (state.detailOpen) {
          setState({ detailOpen: false, selectedTaskId: null });
        } else if (state.searchQuery) {
          setState({ searchQuery: '', currentView: 'inbox' });
        }
        break;

      case '1':
        if (e.altKey) { setState({ currentView: 'inbox', currentListId: 'inbox' }); e.preventDefault(); }
        break;
      case '2':
        if (e.altKey) { setState({ currentView: 'today', currentListId: 'today' }); e.preventDefault(); }
        break;
      case '3':
        if (e.altKey) { setState({ currentView: 'tomorrow', currentListId: 'tomorrow' }); e.preventDefault(); }
        break;
      case '4':
        if (e.altKey) { setState({ currentView: 'week', currentListId: 'week' }); e.preventDefault(); }
        break;

      case 'b':
      case 'B':
        if (e.ctrlKey || e.metaKey) {
          e.preventDefault();
          setState({ sidebarOpen: !state.sidebarOpen });
        }
        break;
    }
  });
}

// Renders basic Markdown to safe HTML
function renderMarkdown(text) {
  if (!text) return '';
  // Escape HTML first
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  // Headings: ## Title
  html = html.replace(/^##\s+(.+)$/gm, '<strong style="display:block;font-size:1.1em;margin:4px 0">$1</strong>');
  // Bold: **text**
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic: *text*
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Inline code: `code`
  html = html.replace(/`(.+?)`/g, '<code style="background:var(--bg-tertiary);padding:0 4px;border-radius:3px;font-size:0.9em">$1</code>');
  // List items: - item
  html = html.replace(/^-\s+(.+)$/gm, '<div style="padding-left:12px">• $1</div>');
  // Line breaks
  html = html.replace(/\n/g, '<br>');
  return html;
}

function bindDetailEvents(task) {
  // Close
  document.getElementById('detail-close')?.addEventListener('click', () => {
    setState({ detailOpen: false, selectedTaskId: null });
  });

  // Description mode toggle
  document.getElementById('desc-mode-edit')?.addEventListener('click', () => {
    if (descriptionMode !== 'edit') {
      descriptionMode = 'edit';
      renderTaskDetail();
    }
  });
  document.getElementById('desc-mode-preview')?.addEventListener('click', () => {
    if (descriptionMode !== 'preview') {
      descriptionMode = 'preview';
      renderTaskDetail();
    }
  });

  // Duplicate task
  document.getElementById('detail-duplicate')?.addEventListener('click', async () => {
    const newTask = {
      ...task,
      id: 'task_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
      title: 'Cópia de ' + task.title,
      isCompleted: false,
      isCanceled: false,
      completedAt: null,
      createdAt: new Date().toISOString(),
      subtasks: (task.subtasks || []).map(s => ({ ...s, completed: false })),
    };
    await dbAdd('tasks', newTask);
    const tasks = await dbGetAll('tasks');
    setState({ tasks, selectedTaskId: newTask.id });
  });

  // Toggle completed
  document.getElementById('detail-checkbox')?.addEventListener('click', async () => {
    task.isCompleted = !task.isCompleted;
    if (task.isCompleted) task.isCanceled = false;
    task.completedAt = task.isCompleted ? new Date().toISOString() : null;

    // Handle recurrence: create next occurrence when completing
    if (task.isCompleted && task.isRecurring && task.recurRule) {
      await handleRecurrence(task);
    }

    await saveTask(task);
  });

  // Toggle canceled (Won't do)
  document.getElementById('detail-cancel-task')?.addEventListener('click', async () => {
    task.isCanceled = !task.isCanceled;
    if (task.isCanceled) {
      task.isCompleted = false;
      task.completedAt = new Date().toISOString();
    } else {
      task.completedAt = null;
    }
    await saveTask(task);
  });

  // Title: update in memory while typing, save to DB on blur
  document.getElementById('detail-title')?.addEventListener('input', (e) => {
    task.title = e.target.value;
  });
  document.getElementById('detail-title')?.addEventListener('blur', async (e) => {
    task.title = e.target.value;
    await saveTask(task);
  });

  // Description: update in memory while typing, save to DB on blur
  document.getElementById('detail-desc')?.addEventListener('input', (e) => {
    task.description = e.target.value;
  });
  document.getElementById('detail-desc')?.addEventListener('blur', async (e) => {
    task.description = e.target.value;
    await saveTask(task);
  });

  // List
  document.getElementById('detail-list')?.addEventListener('change', async (e) => {
    task.listId = e.target.value;
    await saveTask(task);
  });

  // Date & Time
  document.getElementById('detail-date')?.addEventListener('change', async (e) => {
    task.dueDate = e.target.value || null;
    await saveTask(task);
  });

  document.getElementById('detail-start-time')?.addEventListener('change', async (e) => {
    task.startTime = e.target.value || null;
    await saveTask(task);
  });

  document.getElementById('detail-duration')?.addEventListener('change', async (e) => {
    task.duration = e.target.value ? parseInt(e.target.value) : null;
    await saveTask(task);
  });

  // Priority
  document.querySelectorAll('#detail-priority [data-priority]').forEach(el => {
    el.addEventListener('click', async () => {
      task.priority = parseInt(el.dataset.priority);
      await saveTask(task);
    });
  });

  // Tags toggle
  document.querySelectorAll('[data-tag-toggle]').forEach(el => {
    el.addEventListener('click', async () => {
      const tagId = el.dataset.tagToggle;
      task.tags = task.tags || [];
      const idx = task.tags.indexOf(tagId);
      if (idx >= 0) task.tags.splice(idx, 1);
      else task.tags.push(tagId);
      await saveTask(task);
    });
  });

  // Recurring
  document.getElementById('detail-recur')?.addEventListener('change', async (e) => {
    task.recurRule = e.target.value || null;
    task.isRecurring = !!e.target.value;
    if (!task.recurRule) {
      task.recurType = null;
      task.recurDaysAfter = null;
    }
    await saveTask(task);
  });

  // Recurrence type: after completion
  document.getElementById('detail-recur-after')?.addEventListener('change', async (e) => {
    task.recurType = e.target.checked ? 'after_completion' : 'fixed';
    if (e.target.checked) {
      task.recurDaysAfter = task.recurDaysAfter || 1;
    }
    await saveTask(task);
  });

  document.getElementById('detail-recur-days')?.addEventListener('change', async (e) => {
    task.recurDaysAfter = parseInt(e.target.value) || 1;
    await saveTask(task);
  });

  // Subtask toggle
  document.querySelectorAll('[data-subtask-toggle]').forEach(el => {
    el.addEventListener('click', async () => {
      const idx = parseInt(el.dataset.subtaskToggle);
      task.subtasks[idx].completed = !task.subtasks[idx].completed;
      await saveTask(task);
    });
  });

  // Subtask edit
  document.querySelectorAll('[data-subtask-edit]').forEach(el => {
    let timeout;
    el.addEventListener('input', () => {
      clearTimeout(timeout);
      timeout = setTimeout(async () => {
        const idx = parseInt(el.dataset.subtaskEdit);
        task.subtasks[idx].title = el.value;
        await saveTask(task, false);
      }, 500);
    });
  });

  // Subtask delete
  document.querySelectorAll('[data-subtask-delete]').forEach(el => {
    el.addEventListener('click', async () => {
      const idx = parseInt(el.dataset.subtaskDelete);
      task.subtasks.splice(idx, 1);
      await saveTask(task);
    });
  });

  // Add subtask
  document.getElementById('add-subtask-btn')?.addEventListener('click', async () => {
    task.subtasks = task.subtasks || [];
    task.subtasks.push({ title: '', completed: false });
    await saveTask(task);
    // Focus the new subtask input
    setTimeout(() => {
      const inputs = document.querySelectorAll('[data-subtask-edit]');
      const last = inputs[inputs.length - 1];
      if (last) last.focus();
    }, 100);
  });

  // Delete task
  document.getElementById('detail-delete')?.addEventListener('click', async () => {
    if (confirm('Excluir esta tarefa?')) {
      // dbDelete and dbGetAll already available from db.js
      await dbDelete('tasks', task.id);
      const tasks = await dbGetAll('tasks');
      setState({ tasks, selectedTaskId: null, detailOpen: false });
    }
  });

  // Focus on task
  document.getElementById('detail-pomodoro-focus')?.addEventListener('click', () => {
    setState({
      currentView: 'pomodoro',
      pomodoroTaskId: task.id,
      detailOpen: false
    });
  });

  // Load Pomodoro stats for task
  loadTaskPomodoroStats(task.id);
}

async function loadTaskPomodoroStats(taskId) {
  const sessions = await dbGetByIndex('pomodoroSessions', 'taskId', taskId);
  const totalMinutes = sessions.reduce((sum, s) => sum + (s.duration || 25), 0);
  const el = document.getElementById('detail-pomodoro-time');
  if (el) {
    el.textContent = `Tempo Gasto: ${totalMinutes} min (${sessions.length} sessões)`;
  }
}

async function handleRecurrence(task) {
  const baseDate = task.dueDate ? new Date(task.dueDate + 'T12:00:00') : today();
  let nextDate;

  if (task.recurType === 'after_completion') {
    // Repeat X days after completion date
    const daysAfter = task.recurDaysAfter || 1;
    nextDate = addDays(today(), daysAfter);
  } else {
    // Fixed recurrence: calculate next date from due date
    switch (task.recurRule) {
      case 'daily':
        nextDate = addDays(baseDate, 1);
        break;
      case 'weekdays': {
        nextDate = addDays(baseDate, 1);
        while (nextDate.getDay() === 0 || nextDate.getDay() === 6) {
          nextDate = addDays(nextDate, 1);
        }
        break;
      }
      case 'weekly':
        nextDate = addDays(baseDate, 7);
        break;
      case 'monthly': {
        nextDate = new Date(baseDate);
        nextDate.setMonth(nextDate.getMonth() + 1);
        break;
      }
      case 'yearly': {
        nextDate = new Date(baseDate);
        nextDate.setFullYear(nextDate.getFullYear() + 1);
        break;
      }
      default:
        nextDate = addDays(baseDate, 1);
    }
  }

  if (!nextDate) return;

  // Format next date as YYYY-MM-DD
  const nextDateStr = nextDate.toISOString().split('T')[0];

  // Create a new task instance for the next occurrence
  const nextTask = {
    ...task,
    id: 'task_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
    dueDate: nextDateStr,
    isCompleted: false,
    isCanceled: false,
    completedAt: null,
    createdAt: new Date().toISOString(),
    subtasks: (task.subtasks || []).map(s => ({ ...s, completed: false })),
  };

  await dbAdd('tasks', nextTask);
  const updatedTasks = await dbGetAll('tasks');
  setState({ tasks: updatedTasks });
}

async function saveTask(task, rerender = true) {
  await dbUpdate('tasks', task);
  const tasks = await dbGetAll('tasks');
  setState({ tasks });
}

function initTaskDetail() {
  subscribe('selectedTaskId', () => renderTaskDetail());
  subscribe('detailOpen', () => renderTaskDetail());
}

  switch (smartId) {
    case 'inbox':
      return tasks.filter(t => t.listId === 'inbox' && !t.isCompleted).length;
    case 'today':
      return tasks.filter(t => !t.isCompleted && t.dueDate && isToday(t.dueDate)).length;
    case 'tomorrow':
      return tasks.filter(t => !t.isCompleted && t.dueDate && isTomorrow(t.dueDate)).length;
    case 'week':
      return tasks.filter(t => !t.isCompleted && t.dueDate && isWithinDays(t.dueDate, 7)).length;
    case 'all':
      return tasks.filter(t => !t.isCompleted).length;
    case 'completed':
      return tasks.filter(t => t.isCompleted).length;
    default:
      return 0;
  }
}

function bindSidebarEvents() {
  // Nav item clicks
  document.querySelectorAll('#sidebar .nav-item[data-view]').forEach(el => {
    el.addEventListener('click', () => {
      const view = el.dataset.view;
      if (view === 'kanban') {
        setState({
          currentView: 'kanban',
          kanbanListFilter: 'all',
          selectedTaskId: null,
          detailOpen: false,
          searchQuery: '',
          filterTags: []
        });
      } else {
        setState({
          currentView: view,
          currentListId: view.startsWith('list:') ? view.split(':')[1] : view,
          selectedTaskId: null,
          detailOpen: false,
          searchQuery: '',
          filterTags: []
        });
      }
    });
  });

  // Sidebar toggle
  document.getElementById('sidebar-toggle-btn')?.addEventListener('click', () => {
    setState({ sidebarOpen: !state.sidebarOpen });
  });

  // Search
  document.getElementById('sidebar-search')?.addEventListener('input', (e) => {
    setState({ searchQuery: e.target.value, currentView: e.target.value ? 'search' : state.currentView });
  });

  // Add list
  document.getElementById('add-list-btn')?.addEventListener('click', () => {
    setState({ modalOpen: 'addList', modalData: null });
  });

  // Add folder
  document.getElementById('add-folder-btn')?.addEventListener('click', () => {
    setState({ modalOpen: 'addFolder', modalData: null });
  });

  // Export Data (with security warning)
  document.getElementById('export-data-btn')?.addEventListener('click', async () => {
    const proceed = confirm(
      '⚠️ AVISO DE SEGURANÇA\n\n' +
      'O arquivo exportado conterá TODOS os seus dados (tarefas, notas, descrições) em texto plano.\n\n' +
      'Se houver informações sensíveis, proteja o arquivo após o download.\n\n' +
      'Deseja continuar?'
    );
    if (!proceed) return;

    const json = await exportData();
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `taskflow_backup_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
  });

  // Import Data (with race condition protection + size limit)
  const importInput = document.getElementById('import-file-input');
  let importInProgress = false;
  document.getElementById('import-data-btn')?.addEventListener('click', () => {
    if (importInProgress) { alert('Importação em andamento, aguarde.'); return; }
    if (confirm('Importar um backup IRÁ SUBSTITUIR todos os seus dados atuais. Tem certeza?')) {
      importInput?.click();
    }
  });

  importInput?.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file || importInProgress) return;
    if (file.size > 50 * 1024 * 1024) {
      alert('Arquivo muito grande. Limite: 50 MB.');
      return;
    }
    importInProgress = true;
    const reader = new FileReader();
    reader.onload = async (evt) => {
      try {
        const success = await importData(evt.target.result);
        if (success) {
          alert('Dados importados com sucesso! O aplicativo será recarregado.');
          window.location.reload();
        } else {
          alert('Erro ao importar dados. Arquivo inválido ou corrompido.');
        }
      } finally {
        importInProgress = false;
        importInput.value = '';
      }
    };
    reader.readAsText(file);
  });

  // Clear all tasks
  document.getElementById('clear-tasks-btn')?.addEventListener('click', async () => {
    if (!confirm('⚠️ Atenção: Isso irá APAGAR PERMANENTEMENTE todas as tarefas. Tem certeza?')) return;
    if (!confirm('Esta ação não pode ser desfeita. Confirma a exclusão de TODAS as tarefas?')) return;
    await dbClear('tasks');
    setState({
      tasks: [],
      selectedTaskId: null,
      detailOpen: false,
    });
  });

  // Add tag
  document.getElementById('add-tag-btn')?.addEventListener('click', () => {
    setState({ modalOpen: 'addTag', modalData: null });
  });

  // Folder toggle
  document.querySelectorAll('[data-folder-toggle]').forEach(el => {
    el.addEventListener('click', async () => {
      const folderId = el.dataset.folderToggle;
      const folder = state.folders.find(f => f.id === folderId);
      if (folder) {
        folder.isExpanded = !folder.isExpanded;
        await dbUpdate('folders', folder);
        renderSidebar();
      }
    });
  });

  // Tag view navigation (clicking a tag navigates to its task list view)
  document.querySelectorAll('[data-tag-view]').forEach(el => {
    el.addEventListener('click', () => {
      const tagId = el.dataset.tagView;
      setState({
        currentView: 'tag:' + tagId,
        currentListId: null,
        filterTags: [tagId],
        selectedTaskId: null,
        detailOpen: false,
        searchQuery: ''
      });
    });
  });

  // List drag-and-drop reorder
  let dragListId = null;
  let dragFolderId = null;
  document.querySelectorAll('[data-list-id-drag]').forEach(el => {
    el.addEventListener('dragstart', (e) => {
      dragListId = el.dataset.listIdDrag;
      dragFolderId = el.dataset.folderIdDrag;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragListId);
      setTimeout(() => el.style.opacity = '0.4', 0);
    });

    el.addEventListener('dragend', () => {
      el.style.opacity = '';
      document.querySelectorAll('[data-list-id-drag].drag-over-list').forEach(d => {
        d.classList.remove('drag-over-list');
        d.style.borderTop = '';
      });
    });

    el.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (el.dataset.listIdDrag !== dragListId && el.dataset.folderIdDrag === dragFolderId) {
        el.classList.add('drag-over-list');
        el.style.borderTop = '2px solid var(--primary)';
      }
    });

    el.addEventListener('dragleave', () => {
      el.classList.remove('drag-over-list');
      el.style.borderTop = '';
    });

    el.addEventListener('drop', async (e) => {
      e.preventDefault();
      el.classList.remove('drag-over-list');
      el.style.borderTop = '';
      const targetListId = el.dataset.listIdDrag;
      if (!dragListId || dragListId === targetListId) return;
      if (el.dataset.folderIdDrag !== dragFolderId) return; // only same group

      const srcList = state.lists.find(l => l.id === dragListId);
      const tgtList = state.lists.find(l => l.id === targetListId);
      if (!srcList || !tgtList) return;

      // Swap sortOrder
      const tmp = srcList.sortOrder;
      srcList.sortOrder = tgtList.sortOrder;
      tgtList.sortOrder = tmp;
      await dbUpdate('lists', srcList);
      await dbUpdate('lists', tgtList);
      setState({ lists: await dbGetAll('lists') });
    });
  });

  // Context menu for lists
  document.querySelectorAll('[data-context="list"]').forEach(el => {
    el.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      const listId = el.dataset.listId;
      showListContextMenu(e.clientX, e.clientY, listId);
    });
  });

  // Context menu for tags
  document.querySelectorAll('[data-context="tag"]').forEach(el => {
    el.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      showTagContextMenu(e.clientX, e.clientY, el.dataset.tagId);
    });
  });
}

function showListContextMenu(x, y, listId) {
  const existing = document.querySelector('.context-menu');
  if (existing) existing.remove();

  const menu = document.createElement('div');
  menu.className = 'context-menu';
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
  menu.innerHTML = `
    <div class="context-menu-item" data-action="edit">${icon('edit')} Editar Lista</div>
    <div class="context-menu-divider"></div>
    <div class="context-menu-item danger" data-action="delete">${icon('trash')} Excluir Lista</div>
  `;

  document.body.appendChild(menu);

  // Ensure menu stays in viewport
  const rect = menu.getBoundingClientRect();
  if (rect.right > window.innerWidth) menu.style.left = (x - rect.width) + 'px';
  if (rect.bottom > window.innerHeight) menu.style.top = (y - rect.height) + 'px';

  menu.addEventListener('click', async (e) => {
    const action = e.target.closest('[data-action]')?.dataset.action;
    if (action === 'edit') {
      const list = state.lists.find(l => l.id === listId);
      setState({ modalOpen: 'editList', modalData: list });
    } else if (action === 'delete') {
      if (confirm('Tem certeza que deseja excluir esta lista? As tarefas serão movidas para a Caixa de Entrada.')) {
        // Move tasks to inbox
        const tasks = state.tasks.filter(t => t.listId === listId);
        for (const task of tasks) {
          task.listId = 'inbox';
          await dbUpdate('tasks', task);
        }
        await dbDelete('lists', listId);
        const updatedLists = await dbGetAll('lists');
        const updatedTasks = await dbGetAll('tasks');
        setState({
          lists: updatedLists,
          tasks: updatedTasks,
          currentView: 'inbox',
          currentListId: 'inbox'
        });
      }
    }
    menu.remove();
  });

  const closeMenu = (e) => {
    if (!menu.contains(e.target)) {
      menu.remove();
      document.removeEventListener('click', closeMenu);
    }
  };
  setTimeout(() => document.addEventListener('click', closeMenu), 10);
}

function showTagContextMenu(x, y, tagId) {
  const existing = document.querySelector('.context-menu');
  if (existing) existing.remove();

  const tag = state.tags.find(t => t.id === tagId);
  if (!tag) return;

  const menu = document.createElement('div');
  menu.className = 'context-menu';
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
  menu.innerHTML = `
    <div class="context-menu-item" data-action="edit">${icon('edit')} Editar Tag</div>
    <div class="context-menu-divider"></div>
    <div class="context-menu-item danger" data-action="delete">${icon('trash')} Excluir Tag</div>
  `;

  document.body.appendChild(menu);

  const rect = menu.getBoundingClientRect();
  if (rect.right > window.innerWidth) menu.style.left = (x - rect.width) + 'px';
  if (rect.bottom > window.innerHeight) menu.style.top = (y - rect.height) + 'px';

  menu.addEventListener('click', async (e) => {
    const action = e.target.closest('[data-action]')?.dataset.action;
    if (action === 'edit') {
      setState({ modalOpen: 'editTag', modalData: tag });
    } else if (action === 'delete') {
      if (confirm(`Excluir a tag "${tag.name}"? Ela será removida de todas as tarefas.`)) {
        const tasksWithTag = state.tasks.filter(t => (t.tags || []).includes(tagId));
        for (const task of tasksWithTag) {
          task.tags = task.tags.filter(id => id !== tagId);
          await dbUpdate('tasks', task);
        }
        await dbDelete('tags', tagId);
        const updatedState = {
          tags: await dbGetAll('tags'),
          tasks: await dbGetAll('tasks'),
        };
        if (state.currentView === 'tag:' + tagId) {
          updatedState.currentView = 'inbox';
          updatedState.currentListId = 'inbox';
        }
        setState(updatedState);
      }
    }
    menu.remove();
  });

  const closeMenu = (e) => {
    if (!menu.contains(e.target)) {
      menu.remove();
      document.removeEventListener('click', closeMenu);
    }
  };
  setTimeout(() => document.addEventListener('click', closeMenu), 10);
}

function getTasksForView() {
  let tasks = [...state.tasks];
  const view = state.currentView;

  // Search filter
  if (state.searchQuery) {
    const q = state.searchQuery.toLowerCase();
    tasks = tasks.filter(t =>
      t.title.toLowerCase().includes(q) ||
      (t.description || '').toLowerCase().includes(q) ||
      (t.tags || []).some(tagId => {
        const tag = state.tags.find(tg => tg.id === tagId);
        return tag && tag.name.toLowerCase().includes(q);
      })
    );
  }

  // Tag filter
  if (state.filterTags.length > 0) {
    tasks = tasks.filter(t => (t.tags || []).some(tagId => state.filterTags.includes(tagId)));
  }

  // Priority filter
  if (state.filterPriority !== null && state.filterPriority !== undefined) {
    tasks = tasks.filter(t => t.priority === state.filterPriority);
  }

  // View-specific filtering
  switch (view) {
    case 'inbox':
      tasks = tasks.filter(t => t.listId === 'inbox');
      break;
    case 'today':
      tasks = tasks.filter(t => t.dueDate && (isToday(t.dueDate) || (!t.isCompleted && isPast(t.dueDate))));
      break;
    case 'tomorrow':
      tasks = tasks.filter(t => t.dueDate && isTomorrow(t.dueDate));
      break;
    case 'week':
      tasks = tasks.filter(t => t.dueDate && isWithinDays(t.dueDate, 7));
      break;
    case 'all':
      break;
    case 'completed':
      return tasks.filter(t => t.isCompleted).sort((a, b) => new Date(b.completedAt) - new Date(a.completedAt));
    default:
      if (view.startsWith('list:')) {
        const listId = view.split(':')[1];
        tasks = tasks.filter(t => t.listId === listId);
      } else if (view.startsWith('tag:')) {
        // tag view: filterTags already set, no additional filter needed
        // but we show all (active+completed) tasks matching the tag
      } else if (view === 'search') {
        // search already handled above
      }
  }

  // Separate completed and active
  const active = tasks.filter(t => !t.isCompleted && !t.isCanceled);
  const completed = tasks.filter(t => t.isCompleted || t.isCanceled);

  // Sort active tasks
  active.sort((a, b) => {
    switch (state.sortBy) {
      case 'dueDate':
        if (!a.dueDate && !b.dueDate) return 0;
        if (!a.dueDate) return 1;
        if (!b.dueDate) return -1;
        return state.sortDir === 'asc'
          ? parseLocal(a.dueDate) - parseLocal(b.dueDate)
          : parseLocal(b.dueDate) - parseLocal(a.dueDate);
      case 'priority':
        return state.sortDir === 'asc' ? (b.priority || 0) - (a.priority || 0) : (a.priority || 0) - (b.priority || 0);
      case 'title':
        return state.sortDir === 'asc' ? a.title.localeCompare(b.title) : b.title.localeCompare(a.title);
      case 'createdAt':
        return state.sortDir === 'asc'
          ? new Date(a.createdAt) - new Date(b.createdAt)
          : new Date(b.createdAt) - new Date(a.createdAt);
      default: // sortOrder
        return (a.sortOrder || 0) - (b.sortOrder || 0);
    }
  });

  return { active, completed };
}

function getPriorityColor(priority) {
  switch (priority) {
    case 3: return 'var(--priority-high)';
    case 2: return 'var(--priority-medium)';
    case 1: return 'var(--priority-low)';
    default: return '';
  }
}

function getPriorityClass(priority) {
  switch (priority) {
    case 3: return 'priority-high';
    case 2: return 'priority-medium';
    case 1: return 'priority-low';
    default: return '';
  }
}

function renderTaskItem(task) {
  const list = state.lists.find(l => l.id === task.listId);
  const isNotesList = list?.type === 'notes';
  const taskTags = (task.tags || []).map(id => state.tags.find(t => t.id === id)).filter(Boolean);
  const subtasks = task.subtasks || [];
  const completedSubtasks = subtasks.filter(s => s.completed).length;
  const showListName = ['today', 'tomorrow', 'week', 'all', 'completed', 'search'].includes(state.currentView);

  return `
    <div class="task-item ${task.isCompleted && !isNotesList ? 'completed' : ''} ${task.isCanceled ? 'canceled' : ''} ${state.selectedTaskId === task.id ? 'selected' : ''}"
         data-task-id="${task.id}" draggable="true" style="${task.isCanceled ? 'opacity: 0.6;' : ''}">
      ${task.priority > 0 && !isNotesList ? `<div class="task-item-priority" style="background: ${getPriorityColor(task.priority)}"></div>` : ''}
      <div class="checkbox task-item-checkbox ${task.isCompleted ? 'checked' : ''} ${task.isCanceled ? 'canceled' : ''} ${getPriorityClass(task.priority)}"
           data-task-complete="${task.id}" style="${isNotesList ? 'display:none;' : ''} ${task.isCanceled ? 'background:var(--bg-tertiary);border-color:var(--border-color);color:var(--text-tertiary);' : ''}">
        ${task.isCompleted ? icon('check') : (task.isCanceled ? icon('x') : '')}
      </div>
      <div class="task-item-content">
        <div class="task-item-title">${escapeHtml(task.title)}</div>
        ${task.description ? `<div class="task-item-desc">${escapeHtml(task.description)}</div>` : ''}
        <div class="task-item-meta">
          ${task.dueDate && !isNotesList ? `
            <span class="task-item-due ${getDateClass(task.dueDate)}">
              ${icon('calendar')}
              ${formatDate(task.dueDate)}
            </span>
          ` : ''}
          ${task.isRecurring ? `<span class="badge badge-gray">${icon('repeat')} Recorrente</span>` : ''}
          ${subtasks.length > 0 ? `
            <span class="task-item-subtask-count">

            </span>
          ` : ''}
          ${showListName && list ? `
            <span class="task-item-list-name">
              <span class="task-item-list-dot" style="background: ${list.color}"></span>
              ${escapeHtml(list.emoji || '')} ${escapeHtml(list.name)}

            <span class="task-item-tag" style="background: ${t.color}"></span>

}

function renderTaskList() {
  const container = document.getElementById('task-list-content');
  if (!container) return;

  const view = state.currentView;

  // Don't render task list for non-task views
  if (['calendar', 'pomodoro', 'habits', 'stats', 'eisenhower'].includes(view)) return;

  // For kanban, only render if this is not the dedicated kanban view (handled by kanban.js)
  if (view === 'kanban') return;

  // 'completed' view returns a flat sorted array; all other views return { active, completed }
  const tasksResult = getTasksForView();
  let active, completed;
  if (view === 'completed') {
    active = [];
    completed = Array.isArray(tasksResult) ? tasksResult : [];
  } else {
    active = tasksResult.active || [];
    completed = tasksResult.completed || [];
  }

  const targetListId = view.startsWith('list:') ? view.split(':')[1] : (view === 'inbox' ? 'inbox' : null);

  let currentList = null;
  if (view.startsWith('list:')) {
    currentList = state.lists.find(l => l.id === view.split(':')[1]);
  }
  const isNotesList = currentList?.type === 'notes';

  container.innerHTML = `
    <!-- Quick Add (hidden on completed view) -->
    ${view !== 'completed' ? `
    <div class="quick-add">
      <span class="quick-add-icon">${isNotesList ? icon('tag') : icon('plus')}</span>
      <input type="text" class="quick-add-input" placeholder="${isNotesList ? 'Adicionar nova nota...' : 'Adicionar tarefa...'}" id="quick-add-input" />
      <div class="quick-add-actions">
        ${isNotesList ? '' : `
        <button class="btn-icon sm" id="quick-add-date-btn" title="Data">${icon('calendar')}</button>
        <button class="btn-icon sm" id="quick-add-priority-btn" title="Prioridade">${icon('flag')}</button>
        `}
      </div>
    </div>
    ` : ''}

    <!-- Active Tasks -->
    <div class="task-section">
      ${active.length > 0 ? `
        <div class="task-section-header" data-section-toggle="active">
          <span class="task-section-chevron">${icon('chevronDown')}</span>
          <span class="task-section-title">Tarefas</span>
          <span class="task-section-count">${active.length}</span>
        </div>
        <div class="task-section-body" id="active-tasks">
          ${active.map(t => renderTaskItem(t)).join('')}
        </div>
      ` : (completed.length === 0 ? `
        <div class="empty-state">
          ${icon('empty')}
          <div class="empty-state-title">${view === 'completed' ? 'Nenhuma tarefa concluída' : (isNotesList ? 'Nenhuma nota' : 'Nenhuma tarefa')}</div>
          <div class="empty-state-desc">${view === 'completed' ? 'As tarefas que você concluir aparecerão aqui.' : (isNotesList ? 'Crie notas para armazenar ideias e informações.' : 'Adicione uma nova tarefa usando o campo acima ou pressione N')}</div>
        </div>
      ` : '')}
    </div>

    <!-- Completed Tasks section -->
    ${completed.length > 0 ? `
      <div class="task-section">
        <div class="task-section-header" data-section-toggle="completed">
          <span class="task-section-chevron">${icon('chevronDown')}</span>
          <span class="task-section-title">Concluídas</span>
          <span class="task-section-count">${completed.length}</span>
        </div>
        <div class="task-section-body" id="completed-tasks">
          ${completed.map(t => renderTaskItem(t)).join('')}
        </div>
      </div>
    ` : ''}
  `;

  bindTaskListEvents(targetListId);
}

function bindTaskListEvents(targetListId) {
  // Quick add
  const quickAddInput = document.getElementById('quick-add-input');
  if (quickAddInput) {
    quickAddInput.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter' && quickAddInput.value.trim()) {
        const rawTitle = quickAddInput.value.trim();
        const extracted = extractNaturalDate(rawTitle);
        const title = extracted.cleanText || rawTitle;
        const listId = targetListId || 'inbox';

        let dueDate = state.currentView === 'today' ? new Date().toISOString().split('T')[0] : null;
        if (extracted.date) {
          dueDate = extracted.date.toISOString().split('T')[0];
        }

        const newTask = {
          title,
          description: '',
          listId,
          priority: 0,
          dueDate,
          tags: [],
          subtasks: [],
          isCompleted: false,
          completedAt: null,
          isRecurring: false,
          recurRule: null,
          sortOrder: state.tasks.length
        };

        await dbAdd('tasks', newTask);
        const updatedTasks = await dbGetAll('tasks');
        setState({ tasks: updatedTasks });
        quickAddInput.value = '';
      }
    });
  }

  // Task click (select)
  document.querySelectorAll('.task-item[data-task-id]').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('[data-task-complete]') || e.target.closest('[data-task-delete]')) return;
      const taskId = el.dataset.taskId;
      setState({ selectedTaskId: taskId, detailOpen: true });
    });
  });

  // Checkbox toggle
  document.querySelectorAll('[data-task-complete]').forEach(el => {
    el.addEventListener('click', async (e) => {
      e.stopPropagation();
      const taskId = el.dataset.taskComplete;
      const task = state.tasks.find(t => t.id === taskId);
      if (task) {
        task.isCompleted = !task.isCompleted;
        task.completedAt = task.isCompleted ? new Date().toISOString() : null;
        await dbUpdate('tasks', task);
        const updatedTasks = await dbGetAll('tasks');
        setState({ tasks: updatedTasks });
      }
    });
  });

  // Delete
  document.querySelectorAll('[data-task-delete]').forEach(el => {
    el.addEventListener('click', async (e) => {
      e.stopPropagation();
      const taskId = el.dataset.taskDelete;
      await dbDelete('tasks', taskId);
      const updatedTasks = await dbGetAll('tasks');
      setState({
        tasks: updatedTasks,
        selectedTaskId: state.selectedTaskId === taskId ? null : state.selectedTaskId,
        detailOpen: state.selectedTaskId === taskId ? false : state.detailOpen
      });
    });
  });

  // Section toggle
  document.querySelectorAll('[data-section-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      const body = el.nextElementSibling;
      const chevron = el.querySelector('.task-section-chevron');
      if (body) {
        body.style.display = body.style.display === 'none' ? '' : 'none';
        chevron?.classList.toggle('collapsed');
      }
    });
  });

  // Drag and drop
  setupTaskDragDrop();
}

function setupTaskDragDrop() {
  let draggedTaskId = null;

  document.querySelectorAll('.task-item[draggable]').forEach(el => {
    el.addEventListener('dragstart', (e) => {
      draggedTaskId = el.dataset.taskId;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });

    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      document.querySelectorAll('.drag-over').forEach(d => d.classList.remove('drag-over'));
    });

    el.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      el.classList.add('drag-over');
    });

    el.addEventListener('dragleave', () => {
      el.classList.remove('drag-over');
    });

    el.addEventListener('drop', async (e) => {
      e.preventDefault();
      el.classList.remove('drag-over');
      const targetId = el.dataset.taskId;

      if (draggedTaskId && draggedTaskId !== targetId) {
        const tasks = [...state.tasks];
        const dragIdx = tasks.findIndex(t => t.id === draggedTaskId);
        const dropIdx = tasks.findIndex(t => t.id === targetId);

        if (dragIdx >= 0 && dropIdx >= 0) {
          const [moved] = tasks.splice(dragIdx, 1);
          tasks.splice(dropIdx, 0, moved);

          // Update sort orders
          tasks.forEach((t, i) => {
            t.sortOrder = i;
          });

          for (const t of tasks) {
            await dbUpdate('tasks', t);
          }

          setState({ tasks: await dbGetAll('tasks') });
        }
      }
    });
  });
}

function initTaskList() {
  subscribeMultiple([
    'currentView', 'tasks', 'lists', 'tags', 'selectedTaskId',
    'searchQuery', 'filterTags', 'filterPriority', 'sortBy', 'sortDir'
  ], () => {
    renderTaskList();
    if (state.detailOpen && state.selectedTaskId) {
      renderTaskDetail();
    }
  });
}

  eisenhower: { title: 'Eisenhower', emoji: '🎯' },

function renderHeader() {
  const el = document.getElementById('main-header');
  if (!el) return;

  const view = state.currentView;
  let viewInfo = VIEW_TITLES[view];

  if (!viewInfo && view.startsWith('list:')) {
    const listId = view.split(':')[1];
    const list = state.lists.find(l => l.id === listId);
    viewInfo = list ? { title: list.name, emoji: list.emoji || '📝' } : { title: 'Lista', emoji: '📝' };
  }
  
  if (!viewInfo && view.startsWith('tag:')) {
    const tagId = view.split(':')[1];
    const tag = state.tags.find(t => t.id === tagId);
    viewInfo = tag ? { title: tag.name, emoji: '🏷️' } : { title: 'Tag', emoji: '🏷️' };
  }

  if (!viewInfo) viewInfo = { title: '', emoji: '' };

  const taskCount = state.tasks.filter(t => {
    if (view === 'completed') return t.isCompleted;
    if (view.startsWith('tag:')) {
      const tagId = view.split(':')[1];
      return !t.isCompleted && (t.tags || []).includes(tagId);
    }
    return !t.isCompleted;
  }).length;

  // Show view switch (list <-> kanban) only when in a named list
  const isInList = view.startsWith('list:');
  const isTaskView = !['calendar', 'kanban', 'pomodoro', 'habits', 'stats', 'eisenhower'].includes(view) || isInList;
  const isDark = getCurrentTheme() === 'dark';

  el.innerHTML = `
    <div class="main-header-left">
      <button class="btn-icon sidebar-open-btn" id="sidebar-open-btn" style="${state.sidebarOpen ? 'display:none' : ''}">
        ${icon('menu')}
      </button>
      <div class="main-header-title">
        <span class="emoji">${viewInfo.emoji}</span>
        <span>${viewInfo.title}</span>
        ${isTaskView ? `<span class="main-header-count">${taskCount}</span>` : ''}
      </div>
    </div>
    <div class="main-header-right">
      ${isTaskView ? `
        <div class="view-toggle">
          <button class="view-toggle-btn ${(!isInList || view.startsWith('list:')) && view !== 'kanban' ? 'active' : ''}"
                  data-header-view="list" title="Lista">${icon('listView')}</button>
          ${isInList ? `<button class="view-toggle-btn ${view === 'kanban' ? 'active' : ''}"
                  data-header-view="kanban" title="Kanban">${icon('kanban')}</button>` : ''}
          <button class="view-toggle-btn ${view === 'calendar' ? 'active' : ''}"
                  data-header-view="calendar" title="Calendário">${icon('calendar')}</button>
        </div>
        <button class="header-btn" id="sort-btn" title="Ordenar">${icon('sort')}</button>
      ` : ''}
      <button class="header-btn" id="theme-toggle" title="${isDark ? 'Modo claro' : 'Modo escuro'}">
        ${isDark ? icon('sun') : icon('moon')}
      </button>
      <button class="header-btn" id="add-task-btn" title="Nova tarefa (N)">
        ${icon('plus')}
      </button>
    </div>
  `;

  bindHeaderEvents();
}

function bindHeaderEvents() {
  // Sidebar open (mobile)
  document.getElementById('sidebar-open-btn')?.addEventListener('click', () => {
    setState({ sidebarOpen: true });
  });

  // Theme toggle
  document.getElementById('theme-toggle')?.addEventListener('click', async () => {
    await toggleTheme();
    renderHeader();
  });

  // Add task
  document.getElementById('add-task-btn')?.addEventListener('click', () => {
    setState({ modalOpen: 'addTask', modalData: null });
  });

  // View toggle
  document.querySelectorAll('[data-header-view]').forEach(el => {
    el.addEventListener('click', () => {
      const view = el.dataset.headerView;
      if (view === 'list') {
        // Return to the list that was being viewed (preserve currentListId)
        const listId = state.currentListId;
        if (listId && listId !== 'kanban' && listId !== 'calendar' && state.lists.find(l => l.id === listId)) {
          setState({ currentView: 'list:' + listId });
        } else {
          setState({ currentView: state.currentListId || 'inbox' });
        }
      } else if (view === 'kanban') {
        // Switch to kanban with current list pre-selected as filter
        setState({ currentView: 'kanban', kanbanListFilter: state.currentListId || 'all' });
      } else {
        setState({ currentView: view });
      }
    });
  });

  // Sort dropdown
  document.getElementById('sort-btn')?.addEventListener('click', (e) => {
    showSortDropdown(e.currentTarget);
  });
}

function showSortDropdown(anchor) {
  const existing = document.querySelector('.dropdown');
  if (existing) { existing.remove(); return; }

  const rect = anchor.getBoundingClientRect();
  const dd = document.createElement('div');
  dd.className = 'dropdown';
  dd.style.position = 'fixed';
  dd.style.top = rect.bottom + 4 + 'px';
  dd.style.right = (window.innerWidth - rect.right) + 'px';
  dd.style.left = 'auto';

  const sorts = [
    { value: 'sortOrder', label: 'Ordem personalizada' },
    { value: 'dueDate', label: 'Data de vencimento' },
    { value: 'priority', label: 'Prioridade' },
    { value: 'title', label: 'Título' },
    { value: 'createdAt', label: 'Data de criação' },
  ];

  dd.innerHTML = sorts.map(s => `
    <div class="context-menu-item ${state.sortBy === s.value ? 'active' : ''}" data-sort="${s.value}" style="${state.sortBy === s.value ? 'color:var(--primary);font-weight:500' : ''}">
      ${s.label}
    </div>
  `).join('');

  document.body.appendChild(dd);

  dd.addEventListener('click', (e) => {
    const sortVal = e.target.closest('[data-sort]')?.dataset.sort;
    if (sortVal) {
      const newDir = state.sortBy === sortVal && state.sortDir === 'asc' ? 'desc' : 'asc';
      setState({ sortBy: sortVal, sortDir: newDir });
      dd.remove();
    }
  });

  setTimeout(() => {
    const close = (e) => {
      if (!dd.contains(e.target)) { dd.remove(); document.removeEventListener('click', close); }
    };
    document.addEventListener('click', close);
  }, 10);
}

function initHeader() {
  subscribeMultiple(['currentView', 'tasks', 'lists', 'sortBy', 'sortDir', 'sidebarOpen'], () => {
    renderHeader();
  });
}

function bindModalEvents() {
  const overlay = document.getElementById('modal-overlay');
  let selectedColor = COLORS[0];
  let selectedEmoji = '';
  let selectedTags = [];
  let selectedPriority = 0;
  let selectedHabitDays = [];

  // Pre-fill selections from existing data
  if (state.modalOpen === 'editList' && state.modalData) {
    selectedColor = state.modalData.color || COLORS[0];
    selectedEmoji = state.modalData.emoji || '';
  }
  if (state.modalOpen === 'editHabit' && state.modalData) {
    selectedColor = state.modalData.color || COLORS[4];
    selectedEmoji = state.modalData.icon || '💪';
    selectedHabitDays = state.modalData.frequencyDays || [];
  }
  if (state.modalOpen === 'editKanbanColumn' && state.modalData && state.modalData.column) {
    selectedColor = state.modalData.column.color || COLORS[0];
  }
  if (state.modalOpen === 'editTag' && state.modalData) {
    selectedColor = state.modalData.color || COLORS[0];
  }

  // Close
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeModal();
  });
  overlay.querySelectorAll('.modal-close').forEach(el => {
    el.addEventListener('click', closeModal);
  });

  // Color picker
  overlay.querySelectorAll('[data-color]').forEach(el => {
    el.addEventListener('click', () => {
      overlay.querySelectorAll('[data-color]').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
      selectedColor = el.dataset.color;
    });
  });

  // Emoji picker
  overlay.querySelectorAll('[data-emoji]').forEach(el => {
    el.addEventListener('click', () => {
      overlay.querySelectorAll('[data-emoji]').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
      selectedEmoji = el.dataset.emoji;
    });
  });

  // Habit frequency custom days
  const freqSelect = document.getElementById('modal-habit-frequency');
  const customDaysContainer = document.getElementById('modal-habit-custom-days');
  if (freqSelect && customDaysContainer) {
    freqSelect.addEventListener('change', (e) => {
      customDaysContainer.style.display = e.target.value === 'custom' ? 'flex' : 'none';
    });
  }

  overlay.querySelectorAll('.habit-day-toggle').forEach(el => {
    el.addEventListener('click', () => {
      const dayIdx = parseInt(el.dataset.dayIndex);
      const idx = selectedHabitDays.indexOf(dayIdx);
      if (idx >= 0) {
        selectedHabitDays.splice(idx, 1);
        el.classList.remove('selected');
        el.style.background = 'var(--bg-tertiary)';
        el.style.color = 'var(--text-secondary)';
      } else {
        selectedHabitDays.push(dayIdx);
        el.classList.add('selected');
        el.style.background = 'var(--primary)';
        el.style.color = 'white';
      }
    });
  });

  // Global Quick Add event
  const globalInput = document.getElementById('global-quick-add-input');
  if (globalInput) {
    globalInput.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter' && globalInput.value.trim()) {
        const rawTitle = globalInput.value.trim();
        const extracted = extractNaturalDate(rawTitle);
        const title = extracted.cleanText || rawTitle;

        let dueDate = null;
        if (extracted.date) {
          dueDate = extracted.date.toISOString().split('T')[0];
        }

        const newTask = {
          title,
          description: '',
          listId: 'inbox',
          priority: 0,
          dueDate,
          tags: [],
          subtasks: [],
          isCompleted: false,
          completedAt: null,
          isRecurring: false,
          recurRule: null,
          sortOrder: state.tasks.length
        };

        await dbAdd('tasks', newTask);
        const updatedTasks = await dbGetAll('tasks');
        setState({ tasks: updatedTasks, modalOpen: null, modalData: null });
      }
    });
  }

  // Tag toggle in task modal
  overlay.querySelectorAll('[data-modal-tag]').forEach(el => {
    el.addEventListener('click', () => {
      const tagId = el.dataset.modalTag;
      const idx = selectedTags.indexOf(tagId);
      if (idx >= 0) {
        selectedTags.splice(idx, 1);
        el.classList.remove('selected');
        const tag = state.tags.find(t => t.id === tagId);
        el.style.background = '';
        el.style.color = '';
        el.style.border = '';
      } else {
        selectedTags.push(tagId);
        el.classList.add('selected');
        const tag = state.tags.find(t => t.id === tagId);
        if (tag) {
          el.style.background = `${tag.color}22`;
          el.style.color = tag.color;
          el.style.border = `1px solid ${tag.color}44`;
        }
      }
    });
  });

  // Priority toggle in task modal
  overlay.querySelectorAll('#modal-task-priority [data-priority]').forEach(el => {
    el.addEventListener('click', () => {
      overlay.querySelectorAll('#modal-task-priority [data-priority]').forEach(p => p.classList.remove('selected'));
      el.classList.add('selected');
      selectedPriority = parseInt(el.dataset.priority);
    });
  });

  // Delete
  document.getElementById('modal-delete')?.addEventListener('click', async () => {
    if (state.modalOpen === 'editList' && state.modalData) {
      const tasks = state.tasks.filter(t => t.listId === state.modalData.id);
      for (const task of tasks) {
        task.listId = 'inbox';
        await dbUpdate('tasks', task);
      }
      await dbDelete('lists', state.modalData.id);
      setState({
        lists: await dbGetAll('lists'),
        tasks: await dbGetAll('tasks'),
        currentView: 'inbox',
        currentListId: 'inbox'
      });
    } else if (state.modalOpen === 'editHabit' && state.modalData) {
      await dbDelete('habits', state.modalData.id);
      setState({ habits: await dbGetAll('habits') });
    } else if (state.modalOpen === 'editTag' && state.modalData) {
      const tagId = state.modalData.id;
      // Remove tag from all tasks that reference it
      const tasksWithTag = state.tasks.filter(t => (t.tags || []).includes(tagId));
      for (const task of tasksWithTag) {
        task.tags = task.tags.filter(id => id !== tagId);
        await dbUpdate('tasks', task);
      }
      await dbDelete('tags', tagId);
      setState({
        tags: await dbGetAll('tags'),
        tasks: await dbGetAll('tasks'),
        ...(state.currentView === 'tag:' + tagId ? { currentView: 'inbox', currentListId: 'inbox' } : {})
      });
    } else if (state.modalOpen === 'editKanbanColumn' && state.modalData) {
      const { listId, column } = state.modalData;
      const list = state.lists.find(l => l.id === listId);
      if (list && list.kanbanColumns) {
        list.kanbanColumns = list.kanbanColumns.filter(c => c.id !== column.id);
        
        // Move tasks to default 'todo' column if their column is deleted
        const tasks = state.tasks.filter(t => t.listId === listId && t.kanbanStatus === column.id);
        for (const task of tasks) {
          task.kanbanStatus = 'todo';
          await dbUpdate('tasks', task);
        }

        await dbUpdate('lists', list);
        setState({ lists: await dbGetAll('lists'), tasks: await dbGetAll('tasks') });
      }
    }
    closeModal();
  });

  // Save
  document.getElementById('modal-save')?.addEventListener('click', async () => {
    switch (state.modalOpen) {
      case 'addList':
      case 'editList': {
        const name = document.getElementById('modal-list-name')?.value.trim();
        if (!name) return;
        const folderId = document.getElementById('modal-list-folder')?.value || null;
        const type = document.getElementById('modal-list-type')?.value || 'tasks';

        if (state.modalOpen === 'editList' && state.modalData) {
          state.modalData.name = name;
          state.modalData.color = selectedColor;
          state.modalData.emoji = selectedEmoji;
          state.modalData.folderId = folderId;
          state.modalData.type = type;
          await dbUpdate('lists', state.modalData);
        } else {
          await dbAdd('lists', {
            name,
            color: selectedColor,
            emoji: selectedEmoji,
            folderId,
            type,
            sortOrder: state.lists.length,
            isDefault: false
          });
        }
        setState({ lists: await dbGetAll('lists') });
        break;
      }

      case 'addFolder': {
        const name = document.getElementById('modal-folder-name')?.value.trim();
        if (!name) return;
        await dbAdd('folders', {
          name,
          isExpanded: true,
          sortOrder: state.folders.length
        });
        setState({ folders: await dbGetAll('folders') });
        break;
      }

      case 'addTask': {
        const title = document.getElementById('modal-task-title')?.value.trim();
        if (!title) return;
        const desc = document.getElementById('modal-task-desc')?.value.trim() || '';
        const listId = document.getElementById('modal-task-list')?.value || 'inbox';
        const dueDate = document.getElementById('modal-task-date')?.value || null;
        const startTime = document.getElementById('modal-task-start-time')?.value || null;
        const durationValue = document.getElementById('modal-task-duration')?.value;
        const duration = durationValue ? parseInt(durationValue) : null;

        await dbAdd('tasks', {
          title,
          description: desc,
          listId,
          priority: selectedPriority,
          dueDate,
          startTime,
          duration,
          tags: selectedTags,
          subtasks: [],
          isCompleted: false,
          completedAt: null,
          isRecurring: false,
          recurRule: null,
          sortOrder: state.tasks.length
        });
        setState({ tasks: await dbGetAll('tasks') });
        break;
      }

      case 'addTag': {
        const name = document.getElementById('modal-tag-name')?.value.trim();
        if (!name) return;
        await dbAdd('tags', { name, color: selectedColor });
        setState({ tags: await dbGetAll('tags') });
        break;
      }

      case 'editTag': {
        const name = document.getElementById('modal-tag-name')?.value.trim();
        if (!name || !state.modalData) return;
        state.modalData.name = name;
        state.modalData.color = selectedColor;
        await dbUpdate('tags', state.modalData);
        setState({ tags: await dbGetAll('tags') });
        break;
      }

      case 'addHabit':
      case 'editHabit': {
        const name = document.getElementById('modal-habit-name')?.value.trim();
        if (!name) return;
        const frequency = document.getElementById('modal-habit-frequency')?.value || 'daily';
        const notificationTime = document.getElementById('modal-habit-time')?.value || null;
        const showInCalendar = document.getElementById('modal-habit-calendar')?.checked ?? true;
        const goalCount = parseInt(document.getElementById('modal-habit-goal-count')?.value || 1) || 1;

        if (state.modalOpen === 'editHabit' && state.modalData) {
          state.modalData.name = name;
          state.modalData.icon = selectedEmoji || '💪';
          state.modalData.color = selectedColor;
          state.modalData.frequency = frequency;
          state.modalData.frequencyDays = selectedHabitDays;
          state.modalData.notificationTime = notificationTime;
          state.modalData.showInCalendar = showInCalendar;
          state.modalData.goalCount = goalCount;
          await dbUpdate('habits', state.modalData);
        } else {
          await dbAdd('habits', {
            name,
            icon: selectedEmoji || '💪',
            color: selectedColor,
            frequency,
            frequencyDays: selectedHabitDays,
            notificationTime,
            showInCalendar,
            goalCount,
            sortOrder: state.habits.length
          });
        }
        setState({ habits: await dbGetAll('habits') });
        break;
      }

      case 'addKanbanColumn':
      case 'editKanbanColumn': {
        const title = document.getElementById('modal-kanban-col-name')?.value.trim();
        if (!title) return;
        const { listId, column } = state.modalData;
        const list = state.lists.find(l => l.id === listId);
        
        if (list) {
          if (!list.kanbanColumns) {
            list.kanbanColumns = [];
          }
          if (state.modalOpen === 'editKanbanColumn') {
            const colIndex = list.kanbanColumns.findIndex(c => c.id === column.id);
            if (colIndex >= 0) {
              list.kanbanColumns[colIndex].title = title;
              list.kanbanColumns[colIndex].color = selectedColor;
            }
          } else {
            const newId = title.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-') + '-' + Date.now();
            list.kanbanColumns.push({
              id: newId,
              title,
              color: selectedColor,
              order: list.kanbanColumns.length
            });
          }
          await dbUpdate('lists', list);
          setState({ lists: await dbGetAll('lists') });
        }
        break;
      }
    }

    closeModal();
  });

  // Enter key to submit
  overlay.querySelectorAll('input[type="text"]').forEach(input => {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('modal-save')?.click();
      }
    });
  });
}

function closeModal() {
  setState({ modalOpen: null, modalData: null });
}

function initModal() {
  subscribe('modalOpen', () => {
    renderModal();
  });
}
