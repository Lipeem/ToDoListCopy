  const month = date.getMonth();
  const mode = state.calendarMode || 'month';
  const listFilter = state.calendarListFilter || 'all';
  const tagFilter = state.calendarTagFilter || '';

  container.innerHTML = `
    <div class="calendar-view">
      <div class="calendar-header">
        <div class="calendar-nav">
          <button class="calendar-nav-btn" id="cal-prev">${icon('chevronLeft')}</button>
          <span class="calendar-month-year">${MONTHS_PT[month]} ${year}</span>
          <button class="calendar-nav-btn" id="cal-next">${icon('chevronRight')}</button>
          <button class="calendar-today-btn" id="cal-today">Hoje</button>
        </div>
        <div style="display:flex;align-items:center;gap:var(--space-2)">
          ${renderListFilterSelect('cal-list-filter', listFilter)}
          ${renderTagFilterSelect('cal-tag-filter', tagFilter)}
          <div class="calendar-view-toggle">
            <button class="calendar-view-btn ${mode === 'month' ? 'active' : ''}" data-cal-mode="month">Mês</button>
            <button class="calendar-view-btn ${mode === 'week' ? 'active' : ''}" data-cal-mode="week">Semana</button>
          </div>
        </div>
      </div>
      ${mode === 'month' ? renderMonthView(year, month, listFilter, tagFilter) : renderWeekView(date, listFilter, tagFilter)}
    </div>
  `;

  bindCalendarEvents();
}

function renderMonthView(year, month, listFilter, tagFilter) {
  const days = getCalendarDays(year, month);
  const tasks = state.tasks.filter(t =>
    !t.isCompleted &&
    t.dueDate &&
    filterByList(t, listFilter) &&
    (!tagFilter || (t.tags || []).includes(tagFilter))
  );

  return `
    <div class="calendar-grid">
      ${DAYS_SHORT_PT.map(d => `<div class="calendar-day-name">${d}</div>`).join('')}
      ${days.map(d => {
        const dayTasks = tasks.filter(t => isSameDay(t.dueDate, d.date));
        const isCurrentDay = isToday(d.date);
        const maxVisible = 3;

        return `
          <div class="calendar-day ${d.isCurrentMonth ? '' : 'other-month'} ${isCurrentDay ? 'today' : ''}"
               data-cal-date="${d.date.toISOString().split('T')[0]}">
            <div class="calendar-day-number">${d.date.getDate()}</div>
            <div class="calendar-day-tasks">
              ${dayTasks.slice(0, maxVisible).map(t => {
                const list = state.lists.find(l => l.id === t.listId);
                const color = (!list || list.id === 'inbox') ? '#6b7280' : list.color;
                const taskTags = (t.tags || []).map(id => state.tags.find(tg => tg.id === id)).filter(Boolean);
                const tagDots = taskTags.map(tg => `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${tg.color};margin-left:2px;flex-shrink:0"></span>`).join('');
                const descIcon = t.description ? '<span style="opacity:0.6;font-size:9px;margin-left:2px">💬</span>' : '';
                return `<div class="calendar-task" title="${t.description ? t.description.slice(0,80) : ''}" style="background:${color}22;color:${color};display:flex;align-items:center;gap:0" data-task-id="${t.id}">
                  <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</span>
                  ${tagDots}${descIcon}
                </div>`;
              }).join('')}
              ${dayTasks.length > maxVisible ? `<div class="calendar-day-more">+${dayTasks.length - maxVisible} mais</div>` : ''}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderWeekView(date, listFilter, tagFilter) {
  const start = new Date(date);
  const day = start.getDay();
  start.setDate(start.getDate() - day);
  start.setHours(0, 0, 0, 0);

  const weekDays = [];
  for (let i = 0; i < 7; i++) {
    weekDays.push(addDays(start, i));
  }

  const tasks = state.tasks.filter(t =>
    !t.isCompleted &&
    t.dueDate &&
    filterByList(t, listFilter || 'all') &&
    (!tagFilter || (t.tags || []).includes(tagFilter))
  );
  const habits = state.habits.filter(h => h.showInCalendar !== false && h.notificationTime);

  // Helper to parse HH:MM into minutes from midnight
  const getMinutes = (timeStr) => {
    if (!timeStr) return 0;
    const [h, m] = timeStr.split(':').map(Number);
    return (h || 0) * 60 + (m || 0);
  };

  const HOURS = Array.from({length: 24}, (_, i) => `${i.toString().padStart(2, '0')}:00`);
  const hourHeight = 60; // px per hour, can be zoomed

  return `
    <div style="flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg-primary);">
      <!-- Zoom controls -->
      <div style="display:flex; justify-content:flex-end; padding:4px 8px; border-bottom:1px solid var(--border-light); background:var(--bg-secondary); gap:6px;">
        <button id="cal-zoom-out" style="padding:2px 10px; border-radius:4px; border:1px solid var(--border-color); background:var(--bg-tertiary); cursor:pointer; font-size:18px;">&#8722;</button>
        <button id="cal-zoom-reset" style="padding:2px 10px; border-radius:4px; border:1px solid var(--border-color); background:var(--bg-tertiary); cursor:pointer; font-size:12px;">Zoom Reset</button>
        <button id="cal-zoom-in" style="padding:2px 10px; border-radius:4px; border:1px solid var(--border-color); background:var(--bg-tertiary); cursor:pointer; font-size:18px;">&#43;</button>
      </div>

      <!-- Header row (Days) -->
      <div style="display:grid; grid-template-columns: 60px repeat(7, 1fr); border-bottom:1px solid var(--border-light); background:var(--bg-secondary); position:sticky; top:0; z-index:10;">
        <div style="border-right:1px solid var(--border-color);"></div>
        ${weekDays.map(d => {
          const isCurrentDay = isToday(d);
          return `
            <div style="padding:var(--space-2); text-align:center; border-right:1px solid var(--border-light); background:${isCurrentDay ? 'var(--primary-alpha)' : 'transparent'};">
              <div style="font-size:var(--fs-xs);color:var(--text-tertiary);text-transform:uppercase">${DAYS_SHORT_PT[d.getDay()]}</div>
              <div style="font-size:var(--fs-lg);font-weight:var(--fw-semibold);color:${isCurrentDay ? 'var(--primary)' : 'var(--text-primary)'}">${d.getDate()}</div>
            </div>
          `;
        }).join('')}
      </div>

      <!-- All-day tasks section -->
      <div style="display:grid; grid-template-columns: 60px repeat(7, 1fr); border-bottom:2px solid var(--border-color); background:var(--bg-primary);">
        <div style="border-right:1px solid var(--border-color); padding:var(--space-1); font-size:10px; color:var(--text-tertiary); text-align:right; line-height:1.2;">O Dia<br>Todo</div>
        ${weekDays.map(d => {
          const dayTasks = tasks.filter(t => isSameDay(t.dueDate, d) && !t.startTime);
          return `
            <div style="border-right:1px solid var(--border-light); padding:var(--space-1); display:flex; flex-direction:column; gap:2px; min-height:36px;">
              ${dayTasks.map(t => {
                const list = state.lists.find(l => l.id === t.listId);
                const color = (!list || list.id === 'inbox') ? '#6b7280' : list.color;
                return `<div class="calendar-task" style="background:${color}22;color:${color};font-size:11px;padding:2px 4px;border-radius:3px;cursor:pointer;" data-task-id="${t.id}">${t.title}</div>`;
              }).join('')}
            </div>
          `;
        }).join('')}
      </div>

      <!-- Timeblocking grid -->
      <div style="flex:1; overflow-y:auto; position:relative;" id="calendar-time-grid">
        <div id="cal-week-inner" style="display:grid; grid-template-columns: 60px repeat(7, 1fr); position:relative;">
          
          <!-- Hours column -->
          <div style="border-right:1px solid var(--border-color); position:relative; z-index:1; background:var(--bg-secondary);">
            ${HOURS.map((h, i) => `
              <div class="cal-hour-cell" style="height:${hourHeight}px; box-sizing:border-box; border-bottom:1px solid var(--border-light); padding-right:8px; text-align:right; font-size:10px; color:var(--text-tertiary); display:flex; align-items:flex-start; justify-content:flex-end;">
                <span style="transform:translateY(-6px); display:inline-block">${h}</span>
              </div>
            `).join('')}
          </div>

          <!-- Day columns with horizontal grid lines and absolute events -->
          ${weekDays.map((d, colIndex) => {
            const dateStr = d.toISOString().split('T')[0];
            const dayScheduled = tasks.filter(t => isSameDay(t.dueDate, d) && t.startTime);
            const dayHabits = habits.filter(h => {
              if (h.frequency === 'daily') return true;
              if (h.frequency === 'custom' && h.frequencyDays?.includes(d.getDay())) return true;
              if (h.frequency === 'weekly' && d.getDay() === 1) return true;
              return false;
            });

            return `
              <div style="border-right:1px solid var(--border-light); position:relative;" class="cal-day-col" data-date="${dateStr}">
                ${HOURS.map(() => `<div class="cal-hour-cell" style="height:${hourHeight}px; border-bottom:1px solid var(--border-light); box-sizing:border-box;"></div>`).join('')}
                <!-- Absolute positioned events -->
                ${dayScheduled.map(t => {
                  const list = state.lists.find(l => l.id === t.listId);
                  const color = (!list || list.id === 'inbox') ? '#6b7280' : list.color;
                  const startMin = getMinutes(t.startTime);
                  const durMin = t.duration || 60;
                  const topPx = (startMin / 60) * hourHeight;
                  const heightPx = Math.max(20, (durMin / 60) * hourHeight - 2);
                  return `<div class="calendar-task" style="position:absolute; top:${topPx}px; height:${heightPx}px; left:2px; right:2px; background:${color}22; color:${color}; border-left:3px solid ${color}; z-index:5; overflow:hidden; border-radius:3px; padding:2px 4px; cursor:pointer;" data-task-id="${t.id}">
                    <div style="font-weight:600;font-size:10px;">${t.startTime}</div>
                    <div style="font-size:11px;line-height:1.2;">${t.title}</div>
                  </div>`;
                }).join('')}
                ${dayHabits.map(h => {
                  const startMin = getMinutes(h.notificationTime);
                  const durMin = 30;
                  const topPx = (startMin / 60) * hourHeight;
                  const heightPx = Math.max(18, (durMin / 60) * hourHeight - 2);
                  return `<div style="position:absolute; top:${topPx}px; height:${heightPx}px; left:2px; right:2px; background:${h.color}18; color:${h.color}; border:1px dashed ${h.color}; border-radius:3px; z-index:4; display:flex; align-items:center; gap:3px; overflow:hidden; padding:1px 3px;">
                    <span style="font-size:12px;">${h.icon || '💪'}</span>
                    <span style="font-size:10px;line-height:1;">${h.name}</span>
                  </div>`;
                }).join('')}
              </div>
            `;
          }).join('')}
        </div>
      </div>
    </div>
  `;
}

function bindCalendarEvents() {
  // List filter
  document.getElementById('cal-list-filter')?.addEventListener('change', (e) => {
    setState({ calendarListFilter: e.target.value });
  });

  // Tag filter
  document.getElementById('cal-tag-filter')?.addEventListener('change', (e) => {
    setState({ calendarTagFilter: e.target.value });
  });

  // Navigation
  document.getElementById('cal-prev')?.addEventListener('click', () => {
    const d = new Date(state.calendarDate);
    if (state.calendarMode === 'month') {
      d.setMonth(d.getMonth() - 1);
    } else {
      d.setDate(d.getDate() - 7);
    }
    setState({ calendarDate: d });
  });

  document.getElementById('cal-next')?.addEventListener('click', () => {
    const d = new Date(state.calendarDate);
    if (state.calendarMode === 'month') {
      d.setMonth(d.getMonth() + 1);
    } else {
      d.setDate(d.getDate() + 7);
    }
    setState({ calendarDate: d });
  });

  document.getElementById('cal-today')?.addEventListener('click', () => {
    setState({ calendarDate: new Date() });
  });

  // Mode toggle
  document.querySelectorAll('[data-cal-mode]').forEach(el => {
    el.addEventListener('click', () => {
      setState({ calendarMode: el.dataset.calMode });
    });
  });

  // Click on task
  document.querySelectorAll('.calendar-task[data-task-id]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      setState({ selectedTaskId: el.dataset.taskId, detailOpen: true });
    });
  });

  // Click on day to add task
  document.querySelectorAll('[data-cal-date]').forEach(el => {
    el.addEventListener('dblclick', () => {
      const date = el.dataset.calDate;
      setState({
        modalOpen: 'addTask',
        modalData: { dueDate: date }
      });
    });
  });

  // Zoom controls for week view
  const grid = document.getElementById('calendar-time-grid');
  const inner = document.getElementById('cal-week-inner');
  if (grid && inner) {
    let hourHeight = parseInt(grid.dataset.hourHeight || '60');

    const applyZoom = (newH) => {
      hourHeight = Math.max(30, Math.min(180, newH));
      grid.dataset.hourHeight = hourHeight;
      inner.querySelectorAll('.cal-hour-cell').forEach(cell => {
        cell.style.height = hourHeight + 'px';
      });
    };

    document.getElementById('cal-zoom-in')?.addEventListener('click', () => applyZoom(hourHeight + 15));
    document.getElementById('cal-zoom-out')?.addEventListener('click', () => applyZoom(hourHeight - 15));
    document.getElementById('cal-zoom-reset')?.addEventListener('click', () => applyZoom(60));

    // Mouse wheel zoom (Ctrl+Wheel or trackpad pinch -> ctrlKey)
    grid.addEventListener('wheel', (e) => {
      if (e.ctrlKey) {
        e.preventDefault();
        applyZoom(hourHeight + (e.deltaY < 0 ? 10 : -10));
      }
    }, { passive: false });
  }
}

function initCalendar() {
  subscribeMultiple(['currentView', 'calendarDate', 'calendarMode', 'calendarListFilter', 'calendarTagFilter', 'tasks', 'lists', 'habits', 'tags'], () => {
    if (state.currentView === 'calendar') {
      renderCalendar();
    }
  });
}


// ── js/components/kanban.js ──
// ============================================
// Kanban Board Component
// ============================================





const KANBAN_COLUMNS = [
  { id: 'todo', title: 'A Fazer', color: '#6b7280' },
  { id: 'doing', title: 'Em Progresso', color: '#4772fa' },
  { id: 'done', title: 'Concluído', color: '#52c41a' },
];

// Bug B fix: validate kanbanStatus against actual column IDs
function getKanbanStatus(task, columns) {
  if (task.isCompleted) return columns[columns.length - 1].id;
  const validIds = columns.map(c => c.id);
  if (task.kanbanStatus && validIds.includes(task.kanbanStatus)) return task.kanbanStatus;
  return columns[0].id; // first column = default
}

function renderKanban() {
  const container = document.getElementById('task-list-content');
  if (!container || state.currentView !== 'kanban') return;

  const kanbanFilter = state.kanbanListFilter || 'all';

  // Determine active list (for column config)
  let activeList = null;
  if (kanbanFilter !== 'all') {
    activeList = state.lists.find(l => l.id === kanbanFilter) || null;
  }
  const columns = activeList?.kanbanColumns || KANBAN_COLUMNS;

  // Bug A fix: filter tasks by selected list
  const allTasks = state.tasks.filter(t => !t.isCanceled);
  const listTasks = kanbanFilter === 'all'
    ? allTasks
    : allTasks.filter(t => t.listId === kanbanFilter);

  container.innerHTML = `
    <div class="kanban-view" style="flex-direction:column;gap:0;overflow:hidden;">
      <div class="kanban-header" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border-light);background:var(--bg-secondary);flex-shrink:0;">
        <div>
          <h2 style="font-size:var(--fs-xl);font-weight:var(--fw-semibold)">📊 Kanban</h2>
          <span style="font-size:var(--fs-sm);color:var(--text-tertiary)">Arraste tarefas entre colunas</span>
        </div>
        <select id="kanban-list-filter" class="select" style="height:32px;font-size:var(--fs-sm);padding:0 8px;min-width:150px;">
          <option value="all" ${kanbanFilter === 'all' ? 'selected' : ''}>Todas as Listas</option>
          <option value="inbox" ${kanbanFilter === 'inbox' ? 'selected' : ''}>📥 Caixa de Entrada</option>
          ${state.lists.filter(l => !l.isDefault).map(l =>
            `<option value="${l.id}" ${kanbanFilter === l.id ? 'selected' : ''}>${l.emoji || '📝'} ${l.name}</option>`
          ).join('')}
        </select>
      </div>
      <div class="kanban-columns-wrapper" style="display:flex;flex-direction:row;gap:var(--space-4);overflow-x:auto;overflow-y:hidden;flex:1;padding:16px;">
        ${columns.map(col => {
          const colTasks = listTasks.filter(t => getKanbanStatus(t, columns) === col.id);
          return `
            <div class="kanban-column" data-kanban-col="${col.id}">
              <div class="kanban-column-header">
                <div class="kanban-column-title" style="display:flex;align-items:center;justify-content:space-between;width:100%">
                  <span>
                    <span class="kanban-column-dot" style="background: ${col.color}"></span>
                    ${col.title}
                    <span class="kanban-column-count">${colTasks.length}</span>
                  </span>
                  ${activeList ? `<button class="btn-icon btn-sm kanban-col-edit" data-edit-col="${col.id}" style="opacity:0.5">${icon('moreH')}</button>` : ''}
                </div>
              </div>
              <div class="kanban-column-body" data-kanban-drop="${col.id}">
                ${colTasks.map(t => renderKanbanCard(t)).join('')}
              </div>
              <div class="kanban-add-card" data-kanban-add="${col.id}">
                ${icon('plus')} Adicionar tarefa
              </div>
            </div>
          `;
        }).join('')}
        <div class="kanban-column" style="background:transparent; border: 2px dashed var(--border-color); display:flex; align-items:center; justify-content:center; cursor:pointer; min-width:200px; flex-shrink:0;" id="kanban-add-column-btn">
          <div style="color:var(--text-tertiary); font-weight:var(--fw-medium)">${icon('plus')} Adicionar Coluna</div>
        </div>
      </div>
    </div>
  `;

  bindKanbanEvents(activeList, columns);
}

function renderKanbanCard(task) {
  const list = state.lists.find(l => l.id === task.listId);
  const priorityColor = task.priority === 3 ? 'var(--priority-high)'
    : task.priority === 2 ? 'var(--priority-medium)'
    : task.priority === 1 ? 'var(--priority-low)' : '';
  const taskTags = (task.tags || []).map(id => state.tags.find(t => t.id === id)).filter(Boolean);
  const subtasks = task.subtasks || [];
  const completedSubs = subtasks.filter(s => s.completed).length;

  return `
    <div class="kanban-card" data-task-id="${task.id}" draggable="true">
      ${priorityColor ? `<div class="kanban-card-priority" style="background: ${priorityColor}"></div>` : ''}
      <div class="kanban-card-title">${escapeHtml(task.title)}</div>
      <div class="kanban-card-meta">
        ${task.dueDate ? `<span class="task-item-due ${getDateClass(task.dueDate)}">${icon('calendar')} ${formatDate(task.dueDate)}</span>` : ''}
        ${subtasks.length > 0 ? `<span class="task-item-subtask-count">${icon('subtask')} ${completedSubs}/${subtasks.length}</span>` : ''}
        ${list ? `
          <span class="task-item-list-name">
            <span class="task-item-list-dot" style="background:${list.color}"></span>
            ${escapeHtml(list.name)}
          </span>
        ` : ''}
        ${taskTags.map(t => `<span class="task-item-tag" style="background:${t.color}"></span>`).join('')}
      </div>
    </div>
  `;
}

function bindKanbanEvents(activeList, columns) {
  let draggedTaskId = null;

  // List filter
  document.getElementById('kanban-list-filter')?.addEventListener('change', (e) => {
    setState({ kanbanListFilter: e.target.value });
  });

  // Card click
  document.querySelectorAll('.kanban-card[data-task-id]').forEach(el => {
    el.addEventListener('click', () => {
      setState({ selectedTaskId: el.dataset.taskId, detailOpen: true });
    });
  });

  // Drag
  document.querySelectorAll('.kanban-card[draggable]').forEach(el => {
    el.addEventListener('dragstart', (e) => {
      draggedTaskId = el.dataset.taskId;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', draggedTaskId);
    });

    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      document.querySelectorAll('.kanban-column-body.drag-over').forEach(d => d.classList.remove('drag-over'));
    });
  });

  // Drop zone
  document.querySelectorAll('[data-kanban-drop]').forEach(zone => {
    zone.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      zone.classList.add('drag-over');
    });

    zone.addEventListener('dragleave', () => {
      zone.classList.remove('drag-over');
    });

    zone.addEventListener('drop', async (e) => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      const targetStatus = zone.dataset.kanbanDrop;

      if (draggedTaskId) {
        const task = state.tasks.find(t => t.id === draggedTaskId);
        if (task) {
          task.kanbanStatus = targetStatus;
          // Check if target column is a "done" type
          const targetCol = columns.find(c => c.id === targetStatus);
          const colTitle = (targetCol?.title || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
          const isDoneColumn = targetStatus === 'done' || colTitle === 'concluido' || colTitle === 'done' || colTitle === 'finalizado';
          if (isDoneColumn) {
            task.isCompleted = true;
            task.completedAt = new Date().toISOString();
          } else {
            task.isCompleted = false;
            task.completedAt = null;
          }
          await dbUpdate('tasks', task);
          setState({ tasks: await dbGetAll('tasks') });
        }
      }
    });
  });

  // Add card
  document.querySelectorAll('[data-kanban-add]').forEach(el => {
    el.addEventListener('click', () => {
      const status = el.dataset.kanbanAdd;
      const kanbanFilter = state.kanbanListFilter || 'all';
      const modalData = { kanbanStatus: status };
      if (kanbanFilter !== 'all') modalData.listId = kanbanFilter;
      setState({ modalOpen: 'addTask', modalData });
    });
  });

  // Add column
  document.getElementById('kanban-add-column-btn')?.addEventListener('click', () => {
    if (activeList) {
      setState({ modalOpen: 'addKanbanColumn', modalData: { listId: activeList.id } });
    } else {
      alert("Selecione uma lista específica no filtro acima para adicionar colunas customizadas.");
    }
  });

  // Edit column
  document.querySelectorAll('.kanban-col-edit').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const colId = el.dataset.editCol;
      const col = columns.find(c => c.id === colId);
      if (col && activeList) {
        setState({ modalOpen: 'editKanbanColumn', modalData: { listId: activeList.id, column: col } });
      }
    });
  });
}

function initKanban() {
  subscribeMultiple(['currentView', 'kanbanListFilter', 'tasks', 'lists', 'tags'], () => {
    if (state.currentView === 'kanban') {
      renderKanban();
    }
  });
}


// ── js/components/pomodoro.js ──
// ============================================
// Pomodoro Timer Component
// ============================================





let timerInterval = null;
let pomodoroTaskSearch = '';
let pomodoroSettingsOpen = false;

async function getSettings() {
  return await getSetting('pomodoro', {
    workDuration: 25,
    shortBreak: 5,
    longBreak: 15,
    sessionsBeforeLongBreak: 4
  });
}

function renderPomodoro() {
  const container = document.getElementById('task-list-content');
  if (!container || state.currentView !== 'pomodoro') return;

  const timeStr = formatTime(state.pomodoroTimeLeft);
  const isRunning = state.pomodoroState === 'running';
  const isPaused = state.pomodoroState === 'paused';
  const pomType = state.pomodoroType;

  // Use cached settings for ring progress; fall back to defaults
  const pomSettings = state._pomodoroSettings || { workDuration: 25, shortBreak: 5, longBreak: 15, sessionsBeforeLongBreak: 4 };
  const totalTime = pomType === 'work' ? pomSettings.workDuration * 60
    : pomType === 'shortBreak' ? pomSettings.shortBreak * 60
    : pomSettings.longBreak * 60;
  const progress = 1 - (state.pomodoroTimeLeft / totalTime);
  const circumference = 2 * Math.PI * 120;
  const dashOffset = circumference * (1 - progress);

  const sessionDots = [];
  for (let i = 0; i < 4; i++) {
    if (i < state.pomodoroSession) sessionDots.push('completed');

async function loadPomodoroStats() {
  const sessions = await dbGetAll('pomodoroSessions');
  const todayStr = new Date().toISOString().split('T')[0];
  const todaySessions = sessions.filter(s => s.date === todayStr);

  const todayCount = todaySessions.length;
  const todayMinutes = todaySessions.reduce((sum, s) => sum + (s.duration || 25), 0);
  const totalCount = sessions.length;

  const elToday = document.getElementById('pom-stat-today');
  const elTime = document.getElementById('pom-stat-time');
  const elTotal = document.getElementById('pom-stat-total');

  if (elToday) elToday.textContent = todayCount;
  if (elTime) elTime.textContent = `${todayMinutes}min`;
  if (elTotal) elTotal.textContent = totalCount;
}

function bindPomodoroEvents() {
  // Toggle (start/pause)
  document.getElementById('pom-toggle')?.addEventListener('click', async () => {
    if (state.pomodoroState === 'running') {
      clearInterval(timerInterval);
      setState({ pomodoroState: 'paused' });
    } else {
      startTimer();
      setState({ pomodoroState: 'running' });
    }
  });

  // Reset
  document.getElementById('pom-reset')?.addEventListener('click', async () => {
    clearInterval(timerInterval);
    const settings = await getSettings();
    const duration = state.pomodoroType === 'work' ? settings.workDuration
      : state.pomodoroType === 'shortBreak' ? settings.shortBreak
      : settings.longBreak;
    setState({
      pomodoroState: 'idle',
      pomodoroTimeLeft: duration * 60
    });
  });

  // Skip
  document.getElementById('pom-skip')?.addEventListener('click', () => {
    clearInterval(timerInterval);
    handleTimerComplete();
  });

  // Type tabs
  document.querySelectorAll('[data-pom-type]').forEach(el => {
    el.addEventListener('click', async () => {
      clearInterval(timerInterval);
      const type = el.dataset.pomType;
      const settings = await getSettings();
      const duration = type === 'work' ? settings.workDuration
        : type === 'shortBreak' ? settings.shortBreak
        : settings.longBreak;
      setState({
        pomodoroType: type,
        pomodoroTimeLeft: duration * 60,
        pomodoroState: 'idle'
      });
    });
  });

  document.getElementById('pom-clear-task')?.addEventListener('click', () => {
    setState({ pomodoroTaskId: null });
  });

  // Task search input
  document.getElementById('pom-task-search')?.addEventListener('input', (e) => {
    pomodoroTaskSearch = e.target.value;
    renderPomodoro();
  });

  // Task selection from search results
  document.querySelectorAll('[data-pom-task-select]').forEach(el => {
    el.addEventListener('click', () => {
      const taskId = el.dataset.pomTaskSelect;
      pomodoroTaskSearch = '';
      setState({ pomodoroTaskId: taskId });
    });
  });

  // Settings toggle
  document.getElementById('pom-settings-toggle')?.addEventListener('click', () => {
    pomodoroSettingsOpen = !pomodoroSettingsOpen;
    renderPomodoro();
  });

  // Save settings
  document.getElementById('pom-settings-save')?.addEventListener('click', async () => {
    const workDuration = parseInt(document.getElementById('pom-set-work')?.value) || 25;
    const shortBreak   = parseInt(document.getElementById('pom-set-short')?.value) || 5;
    const longBreak    = parseInt(document.getElementById('pom-set-long')?.value) || 15;
    const sessionsBeforeLongBreak = parseInt(document.getElementById('pom-set-sessions')?.value) || 4;

    const newSettings = { workDuration, shortBreak, longBreak, sessionsBeforeLongBreak };
    await setSetting('pomodoro', newSettings);

    // If timer is idle, reset to new duration for current type
    let newTimeLeft = state.pomodoroTimeLeft;
    if (state.pomodoroState === 'idle') {
      if (state.pomodoroType === 'work') newTimeLeft = workDuration * 60;
      else if (state.pomodoroType === 'shortBreak') newTimeLeft = shortBreak * 60;
      else newTimeLeft = longBreak * 60;
    }

    setState({ _pomodoroSettings: newSettings, pomodoroTimeLeft: newTimeLeft });
    pomodoroSettingsOpen = false;
    renderPomodoro();
  });
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (state.pomodoroTimeLeft <= 0) {
      clearInterval(timerInterval);
      handleTimerComplete();
    } else {
      setState({ pomodoroTimeLeft: state.pomodoroTimeLeft - 1 });
    }
  }, 1000);
}

async function handleTimerComplete() {
  // Play completion sound
  playCompletionSound();

  const settings = await getSettings();

  if (state.pomodoroType === 'work') {
    // Save session
    await dbAdd('pomodoroSessions', {
      date: new Date().toISOString().split('T')[0],
      duration: settings.workDuration,
      completedAt: new Date().toISOString(),
      taskId: state.pomodoroTaskId || null
    });

    const newSession = state.pomodoroSession + 1;

    if (newSession >= settings.sessionsBeforeLongBreak) {
      // Long break
      setState({
        pomodoroState: 'idle',
        pomodoroType: 'longBreak',
        pomodoroTimeLeft: settings.longBreak * 60,
        pomodoroSession: 0
      });
    } else {
      // Short break
      setState({
        pomodoroState: 'idle',
        pomodoroType: 'shortBreak',
        pomodoroTimeLeft: settings.shortBreak * 60,
        pomodoroSession: newSession
      });
    }
  } else {
    // Break done, back to work
    setState({
      pomodoroState: 'idle',
      pomodoroType: 'work',
      pomodoroTimeLeft: settings.workDuration * 60
    });
  }
}

function playCompletionSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const frequencies = [523.25, 659.25, 783.99]; // C5, E5, G5

    frequencies.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.2);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.2 + 0.5);
      osc.start(ctx.currentTime + i * 0.2);
      osc.stop(ctx.currentTime + i * 0.2 + 0.5);
    });
  } catch (e) {
    // Audio not supported, silent
  }
}

async function initPomodoro() {
  // Cache pomodoro settings in state for synchronous ring progress rendering
  const settings = await getSettings();
  setState({
    _pomodoroSettings: settings,
    pomodoroTimeLeft: settings.workDuration * 60   // sync initial time with saved settings
  });

  subscribeMultiple(['currentView', 'pomodoroState', 'pomodoroType', 'pomodoroTimeLeft', 'pomodoroSession', 'pomodoroTaskId'], () => {
    if (state.currentView === 'pomodoro') {
      renderPomodoro();
    }
  });
}

function renderHabits() {
  const container = document.getElementById('task-list-content');

      </div>

          ${icon('empty')}
          <div class="empty-state-title">Nenhum hábito criado</div>
          <div class="empty-state-desc">Comece criando um novo hábito para acompanhar seu progresso diário</div>
        </div>
      ` : ''}

      </div>

function renderHabitCard(habit, todayStr) {
  // Generate last 7 days
  const weekDays = [];
  const todayDate = today();
  for (let i = 6; i >= 0; i--) {
    weekDays.push(addDays(todayDate, -i));
  }

  return `
    <div class="habit-card" data-habit-id="${habit.id}">
      <div class="habit-icon" style="background: ${habit.color}22; color: ${habit.color}">
        ${habit.icon || '💪'}
      </div>
      <div class="habit-info">
        <div class="habit-name">${habit.name}</div>
        <div class="habit-streak">
          ${icon('fire')}
          <span data-habit-streak="${habit.id}">0 dias</span>
        </div>
      </div>
      <div class="habit-week">
        ${weekDays.map(d => {
          const dateStr = d.toISOString().split('T')[0];
          const dayOfWeek = DAYS_MINI_PT[d.getDay()];
          return `
            <div class="habit-day" data-habit-day="${habit.id}" data-date="${dateStr}"
                 style="cursor:pointer">
              <span class="habit-day-label">${dayOfWeek}</span>
              <span>${d.getDate()}</span>
            </div>
          `;
        }).join('')}
      </div>
      <div class="habit-check-btn" data-habit-check="${habit.id}" data-date="${todayStr}" title="Marcar hoje" data-goal-count="${habit.goalCount || 1}">
        ${habit.goalCount > 1 ? `<span class="habit-progress" data-habit-progress="${habit.id}">0/${habit.goalCount}</span>` : icon('check')}
      </div>
    </div>
  `;
}

async function loadHabitData() {
  const logs = await dbGetAll('habitLogs');

  state.habits.forEach(habit => {
    const habitLogs = logs.filter(l => l.habitId === habit.id);
    const goalCount = habit.goalCount || 1;

    // Group logs by date to count increments per day
    const logsByDate = {};
    habitLogs.forEach(log => {
      if (!logsByDate[log.date]) {
        logsByDate[log.date] = 0;
      }
      logsByDate[log.date]++;
    });

    // Update week day cells - a day is completed if logs >= goalCount
    document.querySelectorAll(`[data-habit-day="${habit.id}"]`).forEach(el => {
      const date = el.dataset.date;
      const count = logsByDate[date] || 0;
      const isCompleted = count >= goalCount;

      if (isCompleted) {
        el.classList.add('completed');
        el.style.background = habit.color;
        el.style.color = 'white';
      } else if (goalCount > 1 && count > 0) {
        // Partial progress for multi-goal habits
        el.classList.add('partial');
        el.style.background = habit.color;
        el.style.opacity = (count / goalCount) * 0.5 + 0.3;
        el.style.color = habit.color;
      }
    });

    // Update check button and progress counter
    const checkBtn = document.querySelector(`[data-habit-check="${habit.id}"]`);
    const todayStr = today().toISOString().split('T')[0];
    const todayCount = logsByDate[todayStr] || 0;
    const todayCompleted = todayCount >= goalCount;

    if (checkBtn) {
      if (todayCompleted) {
        checkBtn.classList.add('checked');
      }

      // Update progress counter for multi-goal habits
      if (goalCount > 1) {
        const progressEl = checkBtn.querySelector('[data-habit-progress]');
        if (progressEl) {
          progressEl.textContent = `${todayCount}/${goalCount}`;
        }
      }
    }

    // Calculate streak - a day counts if logs >= goalCount
    let streak = 0;
    let checkDate = today();
    while (true) {
      const dateStr = checkDate.toISOString().split('T')[0];
      const count = logsByDate[dateStr] || 0;
      if (count >= goalCount) {
        streak++;
        checkDate = addDays(checkDate, -1);
      } else {
        break;
      }
    }
    const streakEl = document.querySelector(`[data-habit-streak="${habit.id}"]`);
    if (streakEl) streakEl.textContent = `${streak} dias`;
  });
}

function bindHabitEvents(todayStr) {
  // Add habit
  document.getElementById('add-habit-btn')?.addEventListener('click', () => {
    setState({ modalOpen: 'addHabit', modalData: null });
  });

  // Check today
  document.querySelectorAll('[data-habit-check]').forEach(el => {
    el.addEventListener('click', async (e) => {
      e.stopPropagation();
      const habitId = el.dataset.habitCheck;
      const date = todayStr;
      const goalCount = parseInt(el.dataset.goalCount) || 1;

      const logs = await dbGetAll('habitLogs');
      const todayLogs = logs.filter(l => l.habitId === habitId && l.date === date);
      const currentCount = todayLogs.length;

      if (currentCount >= goalCount) {
        // At or past goal: remove all logs for today (reset)
        for (const log of todayLogs) {
          await dbDelete('habitLogs', log.id);
        }
      } else {
        // Below goal: add another log (increment)
        await dbAdd('habitLogs', { habitId, date });
      }

      renderHabits();
    });
  });

  // Click on day to toggle
  document.querySelectorAll('[data-habit-day]').forEach(el => {
    el.addEventListener('click', async () => {
      const habitId = el.dataset.habitDay;
      const date = el.dataset.date;
      const habit = state.habits.find(h => h.id === habitId);
      const goalCount = habit?.goalCount || 1;

      const logs = await dbGetAll('habitLogs');
      const dayLogs = logs.filter(l => l.habitId === habitId && l.date === date);
      const currentCount = dayLogs.length;

      if (currentCount >= goalCount) {
        // At or past goal: remove all logs for this day (reset)
        for (const log of dayLogs) {
          await dbDelete('habitLogs', log.id);
        }
      } else {
        // Below goal: add another log (increment)
        await dbAdd('habitLogs', { habitId, date });
      }

      renderHabits();
    });
  });

  // Edit habit (click card)
  document.querySelectorAll('.habit-card[data-habit-id]').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('[data-habit-check]') || e.target.closest('[data-habit-day]')) return;
      const habitId = el.dataset.habitId;
      const habit = state.habits.find(h => h.id === habitId);
      if (habit) {
        setState({ modalOpen: 'editHabit', modalData: habit });
      }
    });
  });
}

function initHabits() {
  subscribeMultiple(['currentView', 'habits'], () => {
    if (state.currentView === 'habits') {
      renderHabits();
    }
  });
}

async function loadStats() {

  const totalTasks = tasks.length;
  const completedTasks = tasks.filter(t => t.isCompleted).length;
  const canceledTasks = tasks.filter(t => t.isCanceled && !t.isCompleted).length;
  const pendingTasks = totalTasks - completedTasks - canceledTasks;
  const completionRate = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
  const totalPomodoros = pomodoroSessions.length;
  const totalFocusMin = pomodoroSessions.reduce((sum, s) => sum + (s.duration || 25), 0);

  // Overview cards
  const overviewEl = document.getElementById('stats-overview');
  if (overviewEl) {
    overviewEl.innerHTML = `
      <div class="stat-card">
        <div class="stat-card-header">
          <span class="stat-card-title">Tarefas Totais</span>
          <div class="stat-card-icon" style="background:var(--primary-alpha);color:var(--primary)">${icon('all')}</div>
        </div>
        <div class="stat-card-value">${totalTasks}</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-header">
          <span class="stat-card-title">Concluídas</span>
          <div class="stat-card-icon" style="background:rgba(82,196,26,0.1);color:var(--accent-green)">${icon('completed')}</div>
        </div>
        <div class="stat-card-value">${completedTasks}</div>
        <div class="stat-card-change positive">Taxa: ${completionRate}%</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-header">
          <span class="stat-card-title">Pendentes</span>
          <div class="stat-card-icon" style="background:rgba(255,140,34,0.1);color:var(--accent-orange)">${icon('today')}</div>
        </div>
        <div class="stat-card-value">${pendingTasks}</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-header">
          <span class="stat-card-title">Sessões Pomodoro</span>
          <div class="stat-card-icon" style="background:rgba(255,77,79,0.1);color:var(--accent-red)">${icon('timer')}</div>
        </div>
        <div class="stat-card-value">${totalPomodoros}</div>
        <div class="stat-card-change">${totalFocusMin}min de foco</div>
      </div>
    `;
  }

  // Completion chart (last 7 days)
  const chartEl = document.getElementById('stats-chart-completion');
  if (chartEl) {
    const last7Days = [];
    const todayDate = today();
    for (let i = 6; i >= 0; i--) {
      const d = addDays(todayDate, -i);
      last7Days.push(d);
    }

    const maxCompleted = Math.max(1, ...last7Days.map(d => {
      return tasks.filter(t =>
        t.isCompleted && t.completedAt &&
        new Date(t.completedAt).toISOString().split('T')[0] === d.toISOString().split('T')[0]
      ).length;
    }));

    chartEl.innerHTML = `
      <div class="chart-header">
        <span class="chart-title">Tarefas Concluídas (Últimos 7 dias)</span>
      </div>
      <div class="chart-bar-container">
        ${last7Days.map(d => {
          const dateStr = d.toISOString().split('T')[0];
          const count = tasks.filter(t =>
            t.isCompleted && t.completedAt &&
            new Date(t.completedAt).toISOString().split('T')[0] === dateStr
          ).length;
          const height = maxCompleted > 0 ? (count / maxCompleted * 100) : 0;

          return `
            <div class="chart-bar-wrapper">
              <div class="chart-bar" style="height: ${Math.max(height, 2)}%">
                <span class="chart-bar-value">${count}</span>
              </div>
              <span class="chart-bar-label">${DAYS_SHORT_PT[d.getDay()]}</span>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  // Tasks by list
  const listStatsEl = document.getElementById('stats-by-list');
  if (listStatsEl) {
    const listCounts = {};
    tasks.forEach(t => {
      if (!listCounts[t.listId]) listCounts[t.listId] = { total: 0, completed: 0 };
      listCounts[t.listId].total++;
      if (t.isCompleted) listCounts[t.listId].completed++;
    });

    const listStats = Object.entries(listCounts).map(([listId, counts]) => {
      const list = state.lists.find(l => l.id === listId);
      return {
        name: list ? `${list.emoji || ''} ${list.name}` : 'Sem lista',
        color: list?.color || '#6b7280',
        ...counts
      };
    }).sort((a, b) => b.total - a.total).slice(0, 5);

    listStatsEl.innerHTML = `
      <div class="chart-header">
        <span class="chart-title">Tarefas por Lista</span>
      </div>
      <div class="stats-list">
        ${listStats.map(s => `
          <div class="stats-list-item">
            <div class="stats-list-item-label">
              <span class="stats-list-item-dot" style="background:${s.color}"></span>
              ${s.name}
            </div>
            <div class="stats-list-item-value">${s.completed}/${s.total}</div>
          </div>
        `).join('')}
      </div>
    `;
  }

  // Tasks by priority
  const prioStatsEl = document.getElementById('stats-by-priority');
  if (prioStatsEl) {
    const priorities = [
      { label: 'Alta', value: 3, color: 'var(--priority-high)' },
      { label: 'Média', value: 2, color: 'var(--priority-medium)' },
      { label: 'Baixa', value: 1, color: 'var(--priority-low)' },
      { label: 'Nenhuma', value: 0, color: 'var(--priority-none)' },
    ];

    prioStatsEl.innerHTML = `
      <div class="chart-header">
        <span class="chart-title">Tarefas por Prioridade</span>
      </div>
      <div class="stats-list">
        ${priorities.map(p => {
          const total = tasks.filter(t => (t.priority || 0) === p.value).length;
          const completed = tasks.filter(t => (t.priority || 0) === p.value && t.isCompleted).length;
          return `
            <div class="stats-list-item">
              <div class="stats-list-item-label">
                <span class="stats-list-item-dot" style="background:${p.color}"></span>
                ${p.label}
              </div>
              <div class="stats-list-item-value">${completed}/${total}</div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }
}

function initStats() {
  subscribeMultiple(['currentView', 'tasks'], () => {
    if (state.currentView === 'stats') {
      renderStats();
    }
  });
}


// ── js/components/eisenhower.js ──
// ============================================
// Eisenhower Matrix Component
// ============================================





const QUADRANTS = [
  { id: 'urgent-important',     priority: 3, label: 'Urgente e Importante',         color: '#ff4d4f', icon: '🔥', desc: 'Fazer agora' },
  { id: 'not-urgent-important', priority: 2, label: 'Importante mas Não Urgente',   color: '#ff8c22', icon: '📋', desc: 'Agendar' },
  { id: 'urgent-not-important', priority: 1, label: 'Urgente mas Não Importante',   color: '#4772fa', icon: '👥', desc: 'Delegar' },
  { id: 'not-urgent-not-important', priority: 0, label: 'Nem Urgente nem Importante', color: '#6b7280', icon: '🗑️', desc: 'Eliminar' },
];

function filterByList(task, filter) {
  if (filter === 'all') return true;
  return task.listId === filter;
}

function getQuadrantTasks(priority) {
  const filter = state.eisenhowerListFilter || 'all';
  return state.tasks.filter(t =>
    !t.isCompleted && !t.isCanceled &&
    (t.priority || 0) === priority &&
    filterByList(t, filter)
  );
}

function renderEisenhower() {
  const container = document.getElementById('task-list-content');
  if (!container || state.currentView !== 'eisenhower') return;

  const listFilter = state.eisenhowerListFilter || 'all';

  container.innerHTML = `
    <div class="eisenhower-view">
      <div class="eisenhower-header">
        <div>
          <h2 style="font-size:var(--fs-xl);font-weight:var(--fw-semibold)">🎯 Matriz de Eisenhower</h2>
          <span style="font-size:var(--fs-sm);color:var(--text-tertiary)">Arraste tarefas entre quadrantes para alterar a prioridade</span>
        </div>
        <select id="eis-list-filter" class="select" style="height:32px;font-size:var(--fs-sm);padding:0 8px;min-width:150px;">
          <option value="all" ${listFilter === 'all' ? 'selected' : ''}>Todas as Listas</option>
          <option value="inbox" ${listFilter === 'inbox' ? 'selected' : ''}>📥 Caixa de Entrada</option>
          ${state.lists.filter(l => !l.isDefault).map(l =>
            `<option value="${l.id}" ${listFilter === l.id ? 'selected' : ''}>${l.emoji || '📝'} ${l.name}</option>`
          ).join('')}
        </select>
      </div>
      <div class="eisenhower-grid">
        ${QUADRANTS.map(q => {
          const tasks = getQuadrantTasks(q.priority);
          return `
            <div class="eisenhower-quadrant" data-eisenhower-drop="${q.priority}" style="border-color: ${q.color}22">
              <div class="eisenhower-quadrant-header" style="background: ${q.color}12; border-bottom: 2px solid ${q.color}">
                <span class="eisenhower-quadrant-title">
                  <span>${q.icon}</span>
                  <span style="color:${q.color};font-weight:var(--fw-semibold)">${q.label}</span>
                </span>
                <span style="font-size:var(--fs-xs);color:var(--text-tertiary)">${q.desc}</span>
                <span class="eisenhower-quadrant-count" style="background:${q.color};color:white">${tasks.length}</span>
              </div>
              <div class="eisenhower-quadrant-body" data-eisenhower-drop="${q.priority}">
                ${tasks.length === 0 ? `
                  <div style="text-align:center;padding:var(--space-6);color:var(--text-tertiary);font-size:var(--fs-sm)">
                    Arraste tarefas aqui
                  </div>
                ` : ''}
                ${tasks.map(t => renderEisenhowerCard(t, q.color)).join('')}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;

  bindEisenhowerEvents();
}

function renderEisenhowerCard(task, quadrantColor) {
  const list = state.lists.find(l => l.id === task.listId);
  const taskTags = (task.tags || []).map(id => state.tags.find(t => t.id === id)).filter(Boolean);
  const subtasks = task.subtasks || [];
  const completedSubs = subtasks.filter(s => s.completed).length;

  return `
    <div class="eisenhower-card" data-task-id="${task.id}" draggable="true">
      <div class="eisenhower-card-title">${task.title}</div>
      <div class="eisenhower-card-meta">
        ${task.dueDate ? `<span class="task-item-due ${getDateClass(task.dueDate)}">${icon('calendar')} ${formatDate(task.dueDate)}</span>` : ''}
        ${subtasks.length > 0 ? `<span>${icon('subtask')} ${completedSubs}/${subtasks.length}</span>` : ''}
        ${list ? `<span><span class="task-item-list-dot" style="background:${list.color}"></span>${list.emoji || ''} ${list.name}</span>` : ''}
        ${taskTags.map(t => `<span class="task-item-tag" style="background:${t.color}"></span>`).join('')}
      </div>
    </div>
  `;
}

function bindEisenhowerEvents() {
  let draggedTaskId = null;

  // List filter
  document.getElementById('eis-list-filter')?.addEventListener('change', (e) => {
    setState({ eisenhowerListFilter: e.target.value });
  });

  // Card click to open detail
  document.querySelectorAll('.eisenhower-card[data-task-id]').forEach(el => {
    el.addEventListener('click', () => {
      setState({ selectedTaskId: el.dataset.taskId, detailOpen: true });
    });
  });

  // Drag start
  document.querySelectorAll('.eisenhower-card[draggable]').forEach(el => {
    el.addEventListener('dragstart', (e) => {
      draggedTaskId = el.dataset.taskId;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', draggedTaskId);
    });

    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      document.querySelectorAll('.eisenhower-quadrant-body.drag-over').forEach(d => d.classList.remove('drag-over'));
    });
  });

  // Drop zones
  document.querySelectorAll('[data-eisenhower-drop]').forEach(zone => {
    zone.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const body = zone.classList.contains('eisenhower-quadrant-body') ? zone : zone.querySelector('.eisenhower-quadrant-body');
      if (body) body.classList.add('drag-over');
    });

    zone.addEventListener('dragleave', (e) => {
      if (!zone.contains(e.relatedTarget)) {
        zone.classList.remove('drag-over');
      }
    });

    zone.addEventListener('drop', async (e) => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      const targetPriority = parseInt(zone.dataset.eisenhowerDrop);

      if (draggedTaskId && !isNaN(targetPriority)) {
        const task = state.tasks.find(t => t.id === draggedTaskId);
        if (task && task.priority !== targetPriority) {
          task.priority = targetPriority;
          await dbUpdate('tasks', task);
          setState({ tasks: await dbGetAll('tasks') });
        }
      }
    });
  });
}

function initEisenhower() {
  subscribeMultiple(['currentView', 'eisenhowerListFilter', 'tasks', 'lists', 'tags'], () => {
    if (state.currentView === 'eisenhower') {
      renderEisenhower();
    }
  });
}

async function init() {
  try {
    // Initialize database
    await openDB();
    await seedDefaults();

    // Load all data
    const [tasks, lists, folders, tags, habits] = await Promise.all([
      dbGetAll('tasks'),
      dbGetAll('lists'),
      dbGetAll('folders'),
      dbGetAll('tags'),
      dbGetAll('habits'),
    ]);

    // Set initial state
    setState({ tasks, lists, folders, tags, habits });

    // Initialize theme
    await initTheme();

    // Initialize all components
    initSidebar();
    initHeader();
    initTaskList();
    initTaskDetail();
    initModal();
    initCalendar();
    initKanban();
    initPomodoro();
    initHabits();
    initStats();
    initEisenhower();
    initShortcuts();

    // Initial render
    renderSidebar();
    renderHeader();
    renderMainView();

    // Subscribe to view changes for main content
    subscribe('currentView', () => {
      renderMainView();
    });

    console.log('✅ TaskFlow initialized successfully!');
  } catch (error) {
    console.error('❌ Failed to initialize:', error);
  }
}

function renderMainView() {
  const view = state.currentView;

  switch (view) {
    case 'calendar':
      renderCalendar();
      break;
    case 'kanban':
      renderKanban();
      break;
    case 'pomodoro':
      renderPomodoro();
      break;
    case 'habits':
      renderHabits();
      break;
    case 'stats':
      renderStats();
      break;
    case 'eisenhower':
      renderEisenhower();
      break;
    default:
      renderTaskList();
      break;
  }
}

// Start the app when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}



  // Hide loading screen

      const loader = document.getElementById('app-loading');
      if (loader) { loader.classList.add('hidden'); setTimeout(() => loader.remove(), 300); }
    }, 500);
  });
})();
  </script>
